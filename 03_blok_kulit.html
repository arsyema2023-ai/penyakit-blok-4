<script>
const DISEASES=[
{id:0,name:"Dermatitis Atopik",pages:[
{title:"Skenario Kasus",step:"IPM-1",content:`<div class="section"><h3>🏥 Skenario</h3><p>Seorang bayi laki-laki, 9 bulan, dibawa ibunya ke Puskesmas dengan keluhan ruam merah, kering, dan gatal di pipi, lipatan siku, dan lutut sejak usia 3 bulan. Bayi sering gelisah dan menggosok-gosokkan wajah ke bantal. Riwayat: ibunya punya alergi (rinitis alergi), susu formula diberikan sejak 2 bulan. Sudah diberi krim bayi tapi tidak membaik.</p></div><div class="media-box"><svg viewBox="0 0 380 80"><rect width="380" height="80" fill="#fdf2f8" rx="10"/><text x="190" y="18" text-anchor="middle" fill="#8e44ad" font-weight="700" font-size="12">DERMATITIS ATOPIK — ECZEMA ATOPIK</text><text x="190" y="34" text-anchor="middle" fill="#555" font-size="9">Inflamasi kulit kronis • IgE ↑ • Kulit kering + gatal • Disfungsi skin barrier</text><text x="190" y="50" text-anchor="middle" fill="#555" font-size="9">Lokasi: wajah & ekstensor (bayi) • fleksural (anak/dewasa)</text><text x="190" y="70" text-anchor="middle" fill="#999" font-size="9">Gambar 1 — Distribusi lesi DA sesuai usia</text></svg></div>`},
{title:"Gejala & Pemeriksaan",step:"IPM-2-5",content:`<div class="section"><h3>🔍 Gejala Klinis</h3><ul><li><strong>Pruritus (gatal) intens — gejala dominan!</strong> Menggosok/menggaruk → infeksi sekunder</li><li>Eritema, papula, vesikel, krusta, likenifikasi (kronis)</li><li>Kulit kering (xerosis) difus</li><li><strong>Distribusi sesuai usia:</strong> Bayi: pipi, ekstensor. Anak: fleksural. Dewasa: tangan, kelopak mata</li><li>Eksaserbasi: Alergen (tungau debu, makanan), iritan, stres, cuaca kering</li></ul><h3>🩺 Pemeriksaan Fisik</h3><ul><li>Eritema + papulovesikel di pipi dan ekstensor — eksudat serosa (+)</li><li>Likenifikasi pada lipatan siku — penebalan kulit + garis-garis kulit bertambah</li><li>Dennie-Morgan fold: Lipatan infraorbital tambahan</li><li>Dermatografisme putih (white dermographism) — tanda khas DA</li></ul></div>`},
{title:"Diagnosis & Tatalaksana",step:"IPM-6-12",content:`<div class="section"><h3>✅ Diagnosis (Kriteria Hanifin-Rajka)</h3><ul><li><strong>Kriteria mayor:</strong> Pruritus, morfologi khas, distribusi fleksural/kronis, riwayat atopi</li><li><strong>Minor:</strong> Xerosis, iktiosis, IgE ↑, early onset (&lt;2 th), Dennie-Morgan, pitiriasis alba</li></ul><div class="media-box" style="background:#f3e6f9;border-color:#8e44ad"><h4 style="color:#8e44ad">Diagnosis Kerja: Dermatitis Atopik (Eczema Atopik) — Eksaserbasi Akut</h4><p>ICD-10: L20.0 • SCORAD: 35 (sedang)</p></div><h3>💊 Tatalaksana</h3><ul><li><strong>Skin barrier repair:</strong> Emolien pelembab (krim/salep) 2-3x/hari — fondasi terapi!</li><li><strong>Anti-inflamasi topikal:</strong> Kortikosteroid topikal: Hidrokortison 1% (wajah/lipatan) atau Mometason furoat 0.1% (tubuh) — oles tipis 2x/hari 5-7 hari, lalu tapering</li><li><strong>Antihistamin oral:</strong> Loratadin 5 mg/hari (untuk gatal)</li><li><strong>Jika infeksi sekunder:</strong> Asam fusidat atau Gentamisin topikal</li><li>Hindari sabun keras, mandi air hangat, pakaian katun longgar</li><li><strong>Rujuk spesialis:</strong> Jika SCORAD berat (&gt;50) atau refrakter → butuh siklosporin/dupilumab</li></ul></div>`}
]},
{id:1,name:"Dermatitis Kontak",pages:[
{title:"Skenario",step:"IPM-1",content:`<div class="section"><h3>🏥 Skenario</h3><p>Seorang perempuan, 25 tahun, datang dengan keluhan ruam merah, gatal, dan melepuh di wajah dan leher sejak 2 hari setelah memakai produk skin care baru (krim pemutih) yang dibeli online. Kulit terasa perih, bengkak, dan keluar cairan bening. Riwayat: kulit sensitif, tidak ada riwayat alergi sebelumnya.</p></div>`},
{title:"Gejala & Pemeriksaan",step:"IPM-2-5",content:`<div class="section"><h3>🔍 Gejala Klinis</h3><ul><li><strong>Dermatitis Kontak Iritan (DKI):</strong> Nyeri/perih lebih dominan, onset cepat (jam-hari), batas tegas, sering dari asam/basa/deterjen</li><li><strong>Dermatitis Kontak Alergik (DKA):</strong> Gatal dominan, onset 24-72 jam, eritema + vesikel, distribusi sesuai kontak</li><li>Edema wajah dan kelopak (+), vesikel atau bula, eksudasi</li><li>Pada DKA: lesi bisa meluas melebihi area kontak</li></ul><h3>🩺 Pemeriksaan Fisik</h3><ul><li>Eritema + edema + vesikel/bula di wajah, leher, dan dekoltase (area pemakaian krim)</li><li>Batas lesi tegas, bentuk irregular sesuai area kontak</li><li>Tidak ada likenifikasi (beda dengan DA kronis)</li><li>Sign: Nikel, wewangian, pengawet (formalin, paraben) — sering jadi penyebab</li></ul></div>`},
{title:"Diagnosis & Tatalaksana",step:"IPM-6-12",content:`<div class="section"><h3>✅ Diagnosis & Tatalaksana</h3><div class="media-box" style="background:#f3e6f9;border-color:#8e44ad"><h4 style="color:#8e44ad">Diagnosis: Dermatitis Kontak Alergika (DKA) Akut</h4><p>ICD-10: L23.9 • Patch test diperlukan untuk konfirmasi</p></div><ul><li><strong>Hentikan kontak dengan allergen/iritan!</strong> — langkah paling penting</li><li><strong>Kompres dingin:</strong> NaCl 0.9% atau Burowi sol 3-4x/hari (untuk acute weeping)</li><li><strong>Kortikosteroid topikal:</strong> Potensi sedang-tinggi (Betametason valerat 0.1%) 2x/hari 5-7 hari</li><li><strong>Antihistamin oral:</strong> Cetirizin 10 mg/hari</li><li><strong>Jika berat:</strong> Prednison oral 0.5-1 mg/kg/hari tapering 2-3 minggu</li></ul><div class="prescription-box"><div class="rx">R/ Resep</div><div class="rx-item"><span class="r">R/</span><span>Betametason valerat 0.1% krim No.I<br>S 2 dd oles tipis (5-7 hari)</span></div><div class="rx-item"><span class="r">R/</span><span>Cetirizin 10 mg tab No.X<br>S 1 dd 1 tab</span></div></div><p>Edukasi: Hentikan produk penyebab. Baca label kosmetik. Lakukan patch test jika perlu.</p></div>`}
]},
{id:2,name:"Akne Vulgaris",pages:[
{title:"Skenario",step:"IPM-1",content:`<div class="section"><h3>🏥 Skenario</h3><p>Seorang remaja laki-laki, 17 tahun, datang dengan keluhan jerawat di wajah, punggung, dan dada sejak 2 tahun. Jerawat berupa komedo, papul merah, dan kadang bernanah. Pasien sering memencet jerawat, meninggalkan bekas hitam (hiperpigmentasi pasca-inflamasi). Riwayat: ayah juga punya jerawat berat saat muda.</p></div>`},
{title:"Gejala & Pemeriksaan",step:"IPM-2-5",content:`<div class="section"><h3>🔍 Gejala & Pemeriksaan</h3><ul><li><strong>Komedo (komedo putih & hitam):</strong> Lesi non-inflamasi — penyumbatan folikel</li><li><strong>Papul, pustul, nodus:</strong> Lesi inflamasi — akibat Propionibacterium acnes</li><li><strong>Kista/jerawat batu:</strong> Lesi berat — bisa meninggalkan <strong>skar (jaringan parut)</strong></li><li>Lokasi: Wajah (area T-zone), punggung, dada, bahu</li></ul></div>`},
{title:"Tatalaksana & Edukasi",step:"IPM-6-12",content:`<div class="section"><h3>💊 Tatalaksana — Grading Berat</h3><div class="media-box" style="background:#f3e6f9;border-color:#8e44ad"><h4 style="color:#8e44ad">Diagnosis: Akne Vulgaris Sedang (Papulopustular)</h4><p>ICD-10: L70.0 • Komedo + papul + pustul terbatas wajah</p></div><div class="media-box"><table><tr style="background:#8e44ad;color:#fff"><th>Grade</th><th>Terapi</th></tr><tr><td>Ringan (komedo)</td><td>Topikal: Adapalen/Benzoyl peroxide/Tretinoin</td></tr><tr><td>Sedang (papul+pustul)</td><td>Topikal + Antibiotik oral (Doksisiklin 100mg/hari)</td></tr><tr><td>Berat (nodus+kista)</td><td>Isotretinoin oral (rjuk spesialis)</td></tr></table></div><ul><li><strong>Benzoyl peroxide 2.5-5%</strong> gel — antibakteri + komedolitik</li><li><strong>Klindamisin 1%</strong> gel/losion — antibiotik topikal</li><li><strong>Adapalen 0.1%</strong> krim — retinoid topikal (malam)</li><li><strong>Doksisiklin 100 mg/hari</strong> (6-12 minggu) — untuk inflamasi</li><li>Jangan memencet! Hindari kosmetik berminyak, cuci muka 2x/hari, diet indeks glikemik rendah sedang diteliti</li></ul></div>`}
]},
{id:3,name:"Skabies",pages:[
{title:"Skenario",step:"IPM-1",content:`<div class="section"><h3>🏥 Skenario</h3><p>Seorang mahasiswa asrama, 20 tahun, datang dengan keluhan gatal hebat di sela-sela jari, perut, dan lipatan tubuh yang memberat pada malam hari. Gatal sudah 2 minggu. Beberapa teman sekamar juga mengalami keluhan serupa. Pasien sudah mencoba obat gatal (salep) tapi tidak mempan.</p></div>`},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:`<div class="section"><h3>🔍 Gejala & Pemeriksaan</h3><ul><li><strong>Pruritus nokturnal (gatal malam hari!)</strong> — patognomonis! — akibat aktivitas tungau Sarcoptes scabiei</li><li>Distribusi khas: Sela-sela jari (finger webs), perut, lipat siku, aksila, genital, pergelangan tangan</li><li>Lesi: Papul eritematosa, vesikel, terowongan (burrows) — garis abu-abu tipis 0.5-1 cm</li><li>Krusta dan ekskoriasi akibat garukan</li><li>Pemeriksaan: Buat kerokan kulit (scraping) → lihat tungau/telur di mikroskop</li></ul><div class="media-box" style="background:#f3e6f9;border-color:#8e44ad;margin-top:8px"><h4 style="color:#8e44ad">Diagnosis: Skabies — Infestasi Sarcoptes scabiei</h4><p>ICD-10: B86 • Pruritus nokturnal • Burrows • Kontak erat (+)</p></div><h3>💊 Tatalaksana</h3><ul><li><strong>Permetrin 5% krim:</strong> Oles seluruh tubuh dari leher ke bawah, bilas 8-12 jam. Ulang 1 minggu lagi</li><li><strong>Alternatif:</strong> Belerang endap (sulfur praecipitatum) 2-10% salep 3 malam berturut</li><li><strong>Antihistamin oral:</strong> Cetirizin 10 mg/hari — kurangi gatal</li><li>Satu tempat tidur: Semua kontak erat dirawat bersamaan!</li><li>Edukasi: Cuci sprei, handuk, pakaian dengan air panas (60°C) atau setrika. Bungkus non-washable dalam plastik 72 jam.</li></ul></div>`}
]},
{id:4,name:"Impetigo",pages:[
{title:"Skenario",step:"IPM-1",content:`<div class="section"><h3>🏥 Skenario</h3><p>Seorang anak laki-laki, 5 tahun, dibawa ibunya dengan luka lepuh di sekitar mulut dan dagu sejak 4 hari. Lepuh berisi cairan kuning, pecah, meninggalkan krusta tebal berwarna madu (honey-colored crust). Lesi menyebar dengan cepat ke pipi dan tangan. Anak demam ringan, nafsu makan turun.</p></div>`},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:`<div class="section"><h3>🔍 Gejala & Pemeriksaan</h3><ul><li><strong>Impetigo kontagiosa (non-bulosa):</strong> Lesi krusta tebal warna madu — patognomonis! Lesi superfisial, erosi, krusta</li><li><strong>Impetigo bulosa:</strong> Lepuh (bula) lembek, berisi cairan kuning jernih → keruh, lebih besar</li><li>Lokasi: Perioral, perinasal, ekstremitas</li><li>Penyebab: Streptococcus pyogenes (grup A) atau Staphylococcus aureus</li><li>Menular melalui kontak langsung — cepat menyebar di sekolah/keluarga</li></ul><div class="media-box" style="background:#f3e6f9;border-color:#8e44ad;margin-top:8px"><h4 style="color:#8e44ad">Diagnosis: Impetigo Kontagiosa — Infeksi Bakteri Superfisial</h4><p>ICD-10: L01.0 • Honey-colored crust • Perioral • Anak-anak</p></div><h3>💊 Tatalaksana</h3><ul><li><strong>Ringan (&lt;5 lesi):</strong> Mupirosin 2% salep 3x/hari 5-7 hari</li><li><strong>Banyak lesi/demam:</strong> Antibiotik sistemik — Amoksisilin-klavulanat 3×250 mg/hari (sirup 3×125mg) ATAU Sefaleksin 25-50 mg/kg/hari selama 7 hari</li><li>Kompres hangat untuk membersihkan krusta</li><li>Edukasi: Cuci tangan, jangan berbagi handuk, pisahkan alat mandi</li><li>Anak cuti sekolah 48 jam setelah antibiotik</li></ul></div>`}
]},
{id:5,name:"Herpes Zoster",pages:[
{title:"Skenario",step:"IPM-1",content:`<div class="section"><h3>🏥 Skenario</h3><p>Seorang laki-laki, 60 tahun, datang dengan keluhan ruam merah melepuh dan nyeri seperti terbakar di dada kiri menjalar ke punggung sejak 4 hari. Nyeri sudah dirasakan 2 hari sebelum ruam muncul (prodromal pain). Ruam hanya di satu sisi tubuh. Pasien merasa lemah dan sedikit demam. Riwayat: DM tipe 2, sering stres akhir-akhir ini.</p></div>`},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:`<div class="section"><h3>🔍 Gejala & Pemeriksaan</h3><ul><li><strong>Prodromal:</strong> Nyeri, kesemutan, atau sensasi terbakar di dermatom 2-3 hari sebelum ruam</li><li><strong>Ruam:</strong> Vesikel berkelompok di atas dasar eritema, unilateral, dermatomal — tidak melewati garis tengah</li><li>Vesikel → pustul → krusta dalam 7-10 hari</li><li>Nyeri neuropatik (burning, shooting) — bisa kronis (post-herpetic neuralgia)</li><li>Reaktivasi virus VZV (Varicella Zoster) — biasanya setelah imunosupresi/stres</li></ul><div class="media-box" style="background:#f3e6f9;border-color:#8e44ad;margin-top:8px"><h4 style="color:#8e44ad">Diagnosis: Herpes Zoster — Dermatom T4-T5 Sinistra</h4><p>ICD-10: B02.9 • Unilateral • Vesikel dermatomal • Nyeri neuropatik</p></div><h3>💊 Tatalaksana</h3><ul><li><strong>Antivirus:</strong> Asiklovir 5×800 mg/hari oral (7 hari) — optimal jika mulai &lt;72 jam ruam</li><li><strong>Analgesik:</strong> Parasetamol/NSAID untuk nyeri akut. Jika PHN: Gabapentin 300 mg/hari titrasi</li><li><strong>Topikal:</strong> Kompres dingin, Krim Asiklovir 5% 5x/hari</li><li>Jaga vesikel tetap bersih dan kering</li><li>Rujuk jika: okuler (V1), Ramsay Hunt (VII), diseminata, imunokompromais</li><li>Edukasi: Menular ke yang belum pernah varisela (cacar air), hindari kontak dengan bayi/ibu hamil</li><li>Vaksinasi VZW (Zostavax/Shingrix) untuk usia &gt;50 th</li></ul></div>`}
]},
{id:6,name:"Herpes Simpleks",pages:[
{title:"Skenario",step:"IPM-1",content:`<div class="section"><h3>🏥 Skenario</h3><p>Seorang perempuan, 28 tahun, datang dengan keluhan lepuh demam (fever blister) di sudut bibir kanan yang muncul berulang tiap kali stres, demam, atau kelelahan. Lepuh terasa perih dan kesemutan sebelum muncul. Lesi biasanya sembuh 7-10 hari sendiri. Kali ini lebih luas dan nyeri.</p></div>`},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:`<div class="section"><h3>🔍 Gejala & Pemeriksaan</h3><ul><li>Prodromal: Kesemutan, perih, atau terbakar di area labial</li><li>Vesikel kecil berkelompok di batas vermilion bibir (herpes labialis)</li><li>Vesikel → pustul → erosi → krusta sembuh 7-14 hari</li><li>Reaktivasi HSV-1 — dipicu demam, stres, UV, imunosupresi</li><li>Khas: Tidak melewati garis tengah, rekuren di tempat yang sama</li></ul><div class="media-box" style="background:#f3e6f9;border-color:#8e44ad;margin-top:8px"><h4 style="color:#8e44ad">Diagnosis: Herpes Simpleks Labialis (Recurrent HSV-1)</h4><p>ICD-10: B00.9 • Vesikel labial • Rekuren + pemicu</p></div><h3>💊 Tatalaksana</h3><ul><li><strong>Topikal:</strong> Krim Asiklovir 5% 5x/hari (optimal saat prodromal)</li><li><strong>Jika berat/rekuren sering:</strong> Asiklovir oral 5×200 mg/hari 5 hari atau Valasiklovir 2×500 mg/hari 3 hari</li><li>Kompres dingin untuk kenyamanan</li><li>Edukasi: Menular melalui kontak — hindari ciuman saat lesi aktif</li><li>Jika rekuren &gt;6x/tahun → terapi supresif Asiklovir 2×400 mg/hari 6-12 bulan</li></ul></div>`}
]},
{id:7,name:"Tinea Korporis",pages:[
{title:"Skenario",step:"IPM-1",content:`<div class="section"><h3>🏥 Skenario</h3><p>Seorang petani, 35 tahun, datang dengan keluhan ruam melingkar (ring-shaped) di lengan dan badan sejak 1 bulan. Ruam terasa gatal, berwarna merah, batas tegas, dan meluas perlahan. Bagian tengah ruam tampak lebih bersih (clearing center). Pasien memelihara kucing di rumah.</p></div>`},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:`<div class="section"><h3>🔍 Gejala & Pemeriksaan</h3><ul><li>Papul eritema → membentuk plak melingkar (anular) dengan batas aktif (skuama, papul, vesikel)</li><li>Central healing — bagian tengah tampak normal (resting center)</li><li>Gatal ringan-sedang</li><li>Penyebab: Jamur dermatofita (Trichophyton rubrum, Microsporum canis dari kucing!)</li><li>Pemeriksaan: Sediaan KOH 10% dari skuama pinggir lesi → lihat hifa (+) — konfirmasi!</li></ul><div class="media-box" style="background:#f3e6f9;border-color:#8e44ad;margin-top:8px"><h4 style="color:#8e44ad">Diagnosis: Tinea Korporis — Infeksi Jamur Dermatofita</h4><p>ICD-10: B35.4 • Anular lesion • Central healing • KOH (+)</p></div><h3>💊 Tatalaksana</h3><ul><li><strong>Antijamur topikal:</strong> Ketokonazol 2% krim ATAU Klotrimazol 1% krim ATAU Terbinafin 1% krim — 2x/hari 2-4 minggu (1 minggu setelah lesi hilang)</li><li><strong>Jika luas (&gt;30% tubuh) atau refrakter:</strong> Terbinafin oral 250 mg/hari 2-4 minggu ATAU Itrakonazol 100-200 mg/hari 1-2 minggu</li><li>Edukasi: Jaga kebersihan, jangan berbagi handuk, obati hewan peliharaan</li><li>Lesi akan membaik dalam 2 minggu. Jika tidak, rujuk spesialis</li></ul></div>`}
]},
{id:8,name:"Pitiriasis Versikolor",pages:[
{title:"Skenario",step:"IPM-1",content:`<div class="section"><h3>🏥 Skenario</h3><p>Seorang remaja laki-laki, 18 tahun, datang dengan keluhan bercak putih di dada, punggung, dan leher saat musim hujan. Bercak tidak gatal (kadang gatal ringan jika berkeringat). Pasien khawatir karena bercak makin meluas dan tidak hilang meski sudah dioles krim putih. Riwayat: sering berkeringat setelah futsal.</p></div>`},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:`<div class="section"><h3>🔍 Gejala & Pemeriksaan</h3><ul><li>Makula hipopigmentasi (putih) atau hiperpigmentasi (coklat) di badan atas</li><li>Batas tegas, permukaan halus dengan skuama halus (scraping sign positif — skuama tipis saat digaruk)</li><li>Distribusi: Dada, punggung, leher, lengan atas — jarang di wajah</li><li>Gatal minimal, terutama setelah berkeringat</li><li>Penyebab: Malassezia furfur (jamur lipofilik) — flora normal yang berlebih</li><li>KOH: Spageti and meatballs (hifa pendek + spora) — khas!</li></ul><div class="media-box" style="background:#f3e6f9;border-color:#8e44ad;margin-top:8px"><h4 style="color:#8e44ad">Diagnosis: Pitiriasis Versikolor (Panu)</h4><p>ICD-10: B36.0 • Hipopigmentasi • Scraping sign (+) • KOH (+)</p></div><h3>💊 Tatalaksana</h3><ul><li><strong>Topikal:</strong> Ketokonazol 2% krim atau shampo (oles 10 menit, bilas) setiap hari 7-14 hari ATAU Selenium sulfida 2.5% losion setiap malam 7 hari</li><li><strong>Jika luas/kronik:</strong> Itrakonazol 200 mg/hari oral 7 hari</li><li>Edukasi: Hipopigmentasi butuh 2-6 bulan untuk kembali normal — jangan khawatir</li><li>Mencegah: Mandi setelah berkeringat, pakaian longgar katun, jangan berbagi handuk</li><li>Tingkat rekurensi tinggi — bisa diulang tiap musim</li></ul></div>`}
]},
{id:9,name:"Urtikaria Akut",pages:[
{title:"Skenario",step:"IPM-1",content:`<div class="section"><h3>🏥 Skenario</h3><p>Seorang mahasiswi, 22 tahun, datang ke IGD dengan keluhan biduran (wheals) merah di sekujur tubuh sejak 1 jam setelah makan udang dan kepiting di pesta ulang tahun. Kulit terasa gatal hebat dan panas. Bibir bengkak ringan, tapi tidak sesak napas. Denyut nadi cepat, TD normal.</p></div>`},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:`<div class="section"><h3>🔍 Gejala & Pemeriksaan</h3><ul><li>Biduran (wheal/flare) — plak eritematosa, edema, ukuran bervariasi (mm-cm)</li><li>Gatal hebat (pruritus intens) sering dengan sensasi terbakar</li><li>Lesi individual hilang &lt;24 jam — migratory (pindah-pindah)</li><li>Bisa disertai angioedema (bibir, kelopak, lidah, genital)</li><li>Penyebab: Makanan (udang, kacang, telur), obat (antibiotik, NSAID), infeksi, gigitan serangga, fisik (tekanan, dingin)</li><li><strong>Anafilaksis?</strong> Cek tanda: sesak napas, stridor, hipotensi, penurunan kesadaran</li></ul><div class="media-box" style="background:#f3e6f9;border-color:#8e44ad;margin-top:8px"><h4 style="color:#8e44ad">Diagnosis: Urtikaria Akut (Alergi Makanan)</h4><p>ICD-10: L50.0 • Wheal & flare • &lt;24 jam • Pasca makan udang</p></div><h3>💊 Tatalaksana</h3><ul><li><strong>Antihistamin H1 oral:</strong> Cetirizin 10 mg ATAU Loratadin 10 mg ATAU Difenhidramin 25-50 mg IM (akut berat)</li><li><strong>Jika berat/angioedema:</strong> Epinefrin 0.3 mg IM (jika ada tanda anafilaksis) + Prednison 30-50 mg oral</li><li><strong>Topikal:</strong> Calamin losion — mengurangi gatal</li><li>Edukasi: Hindari alergen. Bawa antihistamin jika ada riwayat. Jika episode berulang &gt;6 minggu → urtikaria kronik (rujuk spesialis)</li></ul></div>`}
]},
{id:10,name:"Psoriasis Vulgaris",pages:[
{title:"Skenario",step:"IPM-1",content:`<div class="section"><h3>🏥 Skenario</h3><p>Seorang laki-laki, 40 tahun, datang dengan keluhan bercak merah tebal bersisik putih seperti perak (silvery scale) di siku, lutut, dan kulit kepala sejak 2 tahun, hilang timbul. Pasien mengeluh gatal ringan dan kadang sendi terasa nyeri & kaku pagi hari. Riwayat: ayah juga menderita psoriasis.</p></div>`},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:`<div class="section"><h3>🔍 Gejala & Pemeriksaan</h3><ul><li>Plak eritematosa tebal, batas tegas, ditutupi skuama putih mengkilap (mika/silvery scale)</li><li>Lokasi: Ekstensor (siku, lutut), kulit kepala, sakrum, kuku (nail pitting, onikolisis)</li><li>Fenomena tetesan lilin (Auspitz sign): Gesek skuama → titik perdarahan</li><li>Gatal ringan, tapi bisa berat pada scalp</li><li>Artritis psoriatik: Nyeri sendi, kaku pagi, daktilitis (jari sosis)</li><li>Pencetus: Infeksi (strep faringitis — gutata), stres, trauma (Koebner phenomenon), obat (litium, β-blocker)</li></ul><div class="media-box" style="background:#f3e6f9;border-color:#8e44ad;margin-top:8px"><h4 style="color:#8e44ad">Diagnosis: Psoriasis Vulgaris — Stadium Aktif</h4><p>ICD-10: L40.0 • Silvery scale • Auspitz (+) • Ekstensor • Familial</p></div><h3>💊 Tatalaksana</h3><ul><li><strong>Topikal:</strong> Kortikosteroid poten (Betametason valerat 0.1%) + Analog vitamin D (Kalsipotriol) kombinasi — 2x/hari</li><li><strong>Scalp:</strong> Salap/sampo tar batubara (coal tar) 2-5% atau salap salisil 3%</li><li><strong>Sistemik (jika luas/berat):</strong> Metotreksat 7.5-25 mg/minggu (resep spesialis)</li><li><strong>Foto(light)terapi:</strong> UVB narrowband — rujuk spesialis</li><li>Edukasi: Psoriasis adalah autoimun kronik — tidak menular! Hindari pemicu, kontrol stres</li><li>Rujuk jika: luas &gt;30% BSA, artritis, gagal terapi topikal</li></ul></div>`}
]},
{id:11,name:"Dermatitis Seboroik",pages:[
{title:"Skenario",step:"IPM-1",content:`<div class="section"><h3>🏥 Skenario</h3><p>Seorang laki-laki, 35 tahun, datang dengan keluhan kulit kepala bersisik (ketombe) tebal, merah, dan gatal sejak 1 tahun. Selain di kepala, ada bercak merah bersisik di alis, samping hidung (nasolabial), dan dada tengah. Pasien juga punya gangguan neurologis (Parkinson) — lesi lebih berat.</p></div>`},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:`<div class="section"><h3>🔍 Gejala & Pemeriksaan</h3><ul><li>Eritema + skuama berminyak (greasy yellowish scale) di area seboroik</li><li>Distribusi: Scalp (ketombe), alis, nasolabial, retroaurikular, intermammary, axilla, genital</li><li>Gatal bervariasi (ringan-sedang)</li><li>Penyebab: Respons inflamasi terhadap Malassezia furfur + faktor seboroik</li><li>Faktor risiko: HIV, Parkinson (↑ sebum), stres, musim dingin</li></ul><div class="media-box" style="background:#f3e6f9;border-color:#8e44ad;margin-top:8px"><h4 style="color:#8e44ad">Diagnosis: Dermatitis Seboroik — Sedang (Fasial + Skalp)</h4><p>ICD-10: L21.9 • Skuama berminyak • Area seboroik</p></div><h3>💊 Tatalaksana</h3><ul><li><strong>Skalp:</strong> Shampo antijamur (Ketokonazol 2% — 2x/minggu) + Selenium sulfida 2.5% — bergantian. Shampo tar batubara juga efektif</li><li><strong>Fasial/tubuh:</strong> Krim Ketokonazol 2% ATAU Hidrokortison 1% krim (pendek 5-7 hari)</li><li><strong>Kronik berat:</strong> Kortikosteroid poten sedang 2x/hari tapering 2 minggu</li><li>Edukasi: Kondisi kronis — perlu perawatan berkelanjutan. Bisa dikontrol dengan shampoo rutin.</li></ul></div>`}
]},
{id:12,name:"Miliaria",pages:[
{title:"Skenario",step:"IPM-1",content:`<div class="section"><h3>🏥 Skenario</h3><p>Seorang bayi, 6 bulan, dibawa ibunya dengan keluhan bintik merah kecil di leher, dada, dan lipatan paha. Ibu mengatakan belakangan cuaca panas dan bayi banyak berkeringat. Bayi tampak rewel dan sering menggaruk. Tidak demam.</p></div>`},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:`<div class="section"><h3>🔍 Gejala & Pemeriksaan</h3><ul><li><strong>Miliaria Kristalina:</strong> Vesikel jernih, kecil, mudah pecah, tidak meradang — sumbatan stratum korneum</li><li><strong>Miliaria Rubra (biang keringat):</strong> Papul eritematosa, gatal, perih — sumbatan di duktus mid-epidermal (paling sering)</li><li>Lokasi: Leher, dada, lipatan, punggung — area tertutup pakaian</li><li>Dipicu: Panas + lembab + keringat berlebih</li></ul><div class="media-box" style="background:#f3e6f9;border-color:#8e44ad;margin-top:8px"><h4 style="color:#8e44ad">Diagnosis: Miliaria Rubra (Biang Keringat)</h4><p>ICD-10: L74.0/L74.1 • Papul eritematosa • Area lipatan • Cuaca panas</p></div><h3>💊 Tatalaksana</h3><ul><li>Pendinginkan dan keringkan kulit — AC/kipas angin, baju katun tipis</li><li>Mandi air dingin, bedak salisil 1% atau bedak calamin</li><li>Krim hidrokortison 1% jangka pendek (jika gatal berat)</li><li>Edukasi: Hindari bedak tabur (menyumbat pori!). Jaga lingkungan sejuk. Pakaian longgar katun.</li></ul></div>`}
]},
{id:13,name:"Kandidiasis Kutis",pages:[
{title:"Skenario",step:"IPM-1",content:`<div class="section"><h3>🏥 Skenario</h3><p>Seorang perempuan, 45 tahun, dengan riwayat DM tipe 2 tidak terkontrol, datang dengan keluhan ruam merah, basah, dan gatal di lipat paha (genitocrural) sejak 2 minggu. Ruam juga muncul di bawah payudara. Lesi berbatas tegas dengan satelit pustul kecil di tepi. Pasien juga mengeluh keputihan dan gatal pada vagina.</p></div>`},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:`<div class="section"><h3>🔍 Gejala & Pemeriksaan</h3><ul><li>Plak eritematosa, basah (maserasi), batas tegas dengan <strong>satelit pustul</strong> di tepi — patognomonis!</li><li>Lokasi: Lipatan (intertrigo): inguinal, inframammary, aksila, intergluteal</li><li>Gatal dan perih, sering disertai keputihan pada wanita</li><li>Faktor predisposisi: DM, obesitas, antibiotik, imunosupresi, kehamilan</li><li>KOH 10%: Pseudohifa + spora (+) — Candida albicans</li></ul><div class="media-box" style="background:#f3e6f9;border-color:#8e44ad;margin-top:8px"><h4 style="color:#8e44ad">Diagnosis: Kandidiasis Kutis (Intertrigo Kandida) + Vulvovaginitis Kandida</h4><p>ICD-10: B37.2 & B37.3 • Satelit pustul • Lipatan • DM (+)</p></div><h3>💊 Tatalaksana</h3><ul><li><strong>Topikal:</strong> Klotrimazol 1% krim ATAU Mikonazol 2% krim 2x/hari 1-2 minggu ATAU Nistatin salep</li><li><strong>Jaga area tetap kering:</strong> Bedak antijamur, pakaian katun longgar</li><li><strong>Kontrol DM:</strong> Target HbA1c &lt;7%</li><li><strong>Jika luas atau tidak respons:</strong> Flukonazol 150 mg oral dosis tunggal (untuk kutis + vagina)</li><li>Edukasi: Keringkan lipatan setelah mandi. Turunkan berat badan. Ganti pakaian dalam 2x/hari.</li></ul></div>`}
]},
{id:14,name:"Selulitis & Erisipelas",pages:[
{title:"Skenario",step:"IPM-1",content:`<div class="section"><h3>🏥 Skenario</h3><p>Seorang laki-laki, 55 tahun, dengan DM tipe 2 dan ulkus diabetik di kaki, datang dengan kemerahan, bengkak, dan nyeri pada tungkai bawah kanan sejak 2 hari. Kemerahan meluas cepat, pasien demam 38.5°C, menggigil, dan lesu. Ada luka lecet di sela jari sebelumnya. Tungkai terasa hangat dan sangat nyeri saat digerakkan.</p></div>`},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:`<div class="section"><h3>🔍 Gejala & Pemeriksaan</h3><ul><li><strong>Erisipelas:</strong> Infeksi superfisial (dermis atas) — plak merah tegas, tepi meninggi, nyeri, demam tinggi. S. pyogenes</li><li><strong>Selulitis:</strong> Infeksi dermis dalam + subkutis — merah difus, batas tidak tegas, edema, nyeri. S. aureus & Strep</li><li>Tanda sistemik: Demam, takikardi, leukositosis, menggigil</li><li>Komplikasi: Abses, limfangitis, fasciitis nekrotikans (darurat!), sepsis</li></ul><div class="media-box" style="background:#f3e6f9;border-color:#8e44ad;margin-top:8px"><h4 style="color:#8e44ad">Diagnosis: Selulitis Akut Tungkai Bawah Dekstra — ec Ulkus Diabetik</h4><p>ICD-10: L03.1 • Eritema difus + edema + demam • DM (+)</p></div><h3>💊 Tatalaksana</h3><ul><li><strong>Antibiotik sistemik:</strong> Sefaleksin 4×500 mg/hari 7-10 hari ATAU Klindamisin 3×300 mg/hari (jika alergi penisilin)</li><li><strong>Jika DM/gagal ginjal:</strong> Sefazolin IV (di RS) atau Amoksisilin-klavulanat 3×625 mg/hari</li><li>Elevasi tungkai + kompres dingin untuk mengurangi edema</li><li>Rawat luka ulkus diabetik — debridemen, balutan lembab</li><li><strong>Rujuk RS jika:</strong> Demam &gt;38.5, perlu IV, tanda sepsis, curiga fasciitis nekrotikans</li></ul></div>`}
]}
];

// ENGINE
let currentDisease=0, currentPage=0, isFlipping=false;
function init(){
  const list=document.getElementById('diseaseList');
  DISEASES.forEach((d,i)=>{const li=document.createElement('li');li.innerHTML='<span class="num">'+(i+1)+'</span><span class="name">'+d.name+'</span>';li.onclick=()=>goToDisease(i);li.id='disease-'+i;list.appendChild(li);});
  loadDisease(0);
}
function goToDisease(idx){if(isFlipping)return;currentDisease=idx;currentPage=0;loadDisease(idx);document.querySelectorAll('.disease-list li').forEach(l=>l.classList.remove('active'));document.getElementById('disease-'+idx).classList.add('active');}
function loadDisease(idx){
  const d=DISEASES[idx];const book=document.getElementById('flipbook');book.innerHTML='';
  d.pages.forEach((p,i)=>{const div=document.createElement('div');div.className='page'+(i===0?' active':'');div.id='page-'+idx+'-'+i;div.innerHTML='<div class="page-header"><span class="step">'+p.step+'</span><span class="ptitle">'+p.title+'</span></div>'+p.content;book.appendChild(div);});
  updateUI();
}
function updateUI(){const d=DISEASES[currentDisease];document.getElementById('flipTitle').textContent=d.name;document.getElementById('flipBadge').textContent=(currentDisease+1)+'/'+DISEASES.length;document.getElementById('pageNum').textContent=currentPage+1;document.getElementById('pageTotal').textContent=d.pages.length;document.getElementById('prevBtn').disabled=currentPage===0;document.getElementById('nextBtn').disabled=currentPage===d.pages.length-1;document.querySelectorAll('.page').forEach((el,i)=>el.classList.toggle('active',i===currentPage));}
function nextPage(){if(isFlipping||currentPage>=DISEASES[currentDisease].pages.length-1)return;isFlipping=true;const old=document.getElementById('page-'+currentDisease+'-'+currentPage);old.classList.add('flip-out');setTimeout(()=>{old.classList.remove('active','flip-out');currentPage++;document.getElementById('page-'+currentDisease+'-'+currentPage).classList.add('flip-in');updateUI();setTimeout(()=>{document.getElementById('page-'+currentDisease+'-'+currentPage).classList.remove('flip-in');isFlipping=false;},400);},300);}
function prevPage(){if(isFlipping||currentPage<=0)return;isFlipping=true;const old=document.getElementById('page-'+currentDisease+'-'+currentPage);old.style.animation='flipOut .5s ease reverse';setTimeout(()=>{old.classList.remove('active');old.style.animation='';currentPage--;document.getElementById('page-'+currentDisease+'-'+currentPage).classList.add('active');updateUI();setTimeout(()=>{isFlipping=false;},300);},300);}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown')nextPage();if(e.key==='ArrowLeft'||e.key==='ArrowUp')prevPage();});
document.addEventListener('DOMContentLoaded',init);
</script>
</body></html>
