<style>:root{--primary:#16a085;--primary-dark:#0e6655;--accent:#1abc9c;--bg:#f5f6fa;--card:#fff;--text:#2c3e50;--text-light:#95a5a6;--radius:16px;--font:'Segoe UI',system-ui,sans-serif}

body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}

.disease-list li .num{font-size:0.65rem;color:rgba(255,255,255,0.4);min-width:20px;font-weight:700}

.topbar{background:var(--card);padding:10px 20px;box-shadow:0 2px 8px rgba(0,0,0,0.06);display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--accent)}
.topbar h2{font-size:1rem;color:var(--accent)}.topbar .badge{background:var(--accent);color:#fff;padding:2px 10px;border-radius:20px;font-size:0.7rem}

.btn-prev{background:#ecf0f1;color:var(--text)}.btn-prev:hover{background:#dfe4e6}
.btn-next{background:var(--accent);color:#fff}.btn-next:hover{background:var(--primary-dark)}

<script>
const DISEASES=[
{id:0,name:"Otitis Media Akut",pages:[
{title:"Skenario",step:"IPM-1",content:'<div class="section"><h3>🏥 Skenario</h3><p>Seorang anak laki-laki, 3 tahun, dibawa ibunya ke Puskesmas dengan demam tinggi 39°C sejak 3 hari, rewel, dan menarik-narik telinga kanan. Ibu mengatakan anaknya pilek 1 minggu sebelumnya. Anak juga tampak kurang dengar (tidak merespon panggilan kecil). Tidur gelisah. Tidak ada riwayat trauma/cairan keluar dari telinga.</p></div><div class="media-box"><svg viewBox="0 0 380 80"><rect width="380" height="80" fill="#e8f6f3" rx="10"/><text x="190" y="18" text-anchor="middle" fill="#16a085" font-weight="700" font-size="13">OTITIS MEDIA AKUT</text><text x="190" y="36" text-anchor="middle" fill="#555" font-size="9">Infeksi telinga tengah → efusi + peradangan → demam, otalgia</text><text x="190" y="52" text-anchor="middle" fill="#555" font-size="9">Pencetus: Disfungsi tuba Eustachius akibat ISPA</text><text x="190" y="70" text-anchor="middle" fill="#999" font-size="9">Gambar 1 — Anatomi telinga: infeksi kavum timpani</text></svg></div>'},
{title:"Gejala & Pemeriksaan",step:"IPM-2-5",content:'<div class="section"><h3>🔍 Gejala Klinis</h3><ul><li><strong>Otalgia (nyeri telinga):</strong> Anak rewel, menarik telinga, sulit tidur</li><li><strong>Demam:</strong> 38-40°C — sering tinggi</li><li><strong>Conductive hearing loss:</strong> Kurang dengar sementara (efusi di telinga tengah)</li><li>Gejala penyerta: Pilek, batuk, muntah pada anak kecil</li><li>Jika perforasi membran timpani: Cairan keluar (otorhea) — nyeri berkurang</li></ul><h3>🩺 Pemeriksaan Otoskopi</h3><ul><li><strong>Membran timpani:</strong> Hiperemis (merah), bulging (menonjol), suram, refleks cahaya menghilang</li><li>Jika sudah perforasi: lihat sekret di liang telinga, MT perforasi</li><li><strong>Pneumatik otoskopi:</strong> mobilitas MT ↓ (kaku)</li><li>Tanda Mastoiditis: nyeri tekan belakang telinga, auricle drop sign → jika ada, rujuk!</li></ul></div>'},
{title:"Diagnosis & Tatalaksana",step:"IPM-6-12",content:'<div class="section"><h3>✅ Diagnosis (Kriteria AAO-HNS)</h3><p>3 komponen: (1) Onset akut &lt;48 jam, (2) Efusi telinga tengah (bulging/otorrhea), (3) Tanda inflamasi (otalgia/eritema MT)</p><div class="media-box" style="background:#e8f6f3;border-color:#16a085"><h4 style="color:#16a085">Diagnosis: Otitis Media Akut Dekstra</h4><p>ICD-10: H66.0 • Bulging MT • Demam • Usia 3 th</p></div><h3>💊 Tatalaksana</h3><ul><li><strong>Analgesik:</strong> Parasetamol 10-15 mg/kg/dosis setiap 4-6 jam (kontrol nyeri & demam)</li><li><strong>Antibiotik (indikasi pasti):</strong> Berat (&gt;48 jam demam &gt;39°C) atau usia &lt;2 th bilateral → Amoksisilin 45-60 mg/kg/hari 2-3×/hari 10 hari ATAU jika alergi penisilin: Eritromisin 30-50 mg/kg/hari</li><li><strong>Observasi (watchful waiting) 48-72 jam:</strong> Jika usia &gt;2 th, ringan, unilateral → tanpa antibiotik dulu</li><li>Dekongestan oral bukan rekomendasi rutin</li></ul><div class="prescription-box"><div class="rx">R/ Resep</div><div class="rx-item"><span class="r">R/</span><span>Amoksisilin sirup 125mg/5ml No.I<br>S 3×5 ml (sesuai BB)</span></div><div class="rx-item"><span class="r">R/</span><span>Parasetamol sirup 120mg/5ml No.I<br>S 3×5 ml prn demam</span></div></div><p>Edukasi: Kontrol 3 hari. Jika tidak membaik, demam terus, nyeri hebat, atau cairan keluar → rujuk THT. Jika perforasi MT → jangan berenang.</p></div>'}
]},
{id:1,name:"Otitis Eksterna",pages:[
{title:"Skenario",step:"IPM-1",content:'<div class="section"><h3>🏥 Skenario</h3><p>Seorang perempuan, 30 tahun, datang dengan nyeri telinga kiri hebat dan gatal sejak 4 hari. Nyeri bertambah saat mengunyah, menarik daun telinga (tragus) atau menekan area belakang telinga. Ada cairan kuning keluar, tidak berbau. Riwayat: seminggu terakhir berenang di kolam renang umum. Pasien sering membersihkan telinga dengan cotton bud.</p></div>'},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:'<div class="section"><h3>🔍 Gejala & Pemeriksaan</h3><ul><li><strong>Otalgia hebat:</strong> Nyeri saat tarik auricle/tragus (pathognomonic sign) — sangat khas!</li><li>Gatal pada liang telinga (awal), discharge serosa/purulen (kuning)</li><li>Conductive hearing loss ringan (edema liang menutup gendang)</li><li><strong>Otoskopi:</strong> Liang telinga edema, eritema, sekret, debris. Membran timpani normal (bedakan dengan OMA!)</li><li>Penyebab: Pseudomonas aeruginosa & Staph aureus (swimmer\'s ear)</li></ul><div class="media-box" style="background:#e8f6f3;border-color:#16a085;margin-top:8px"><h4 style="color:#16a085">Diagnosis: Otitis Eksterna Akut Sinistra (Swimmer\'s Ear)</h4><p>ICD-10: H60.3 • Tragus sign (+) • Riwayat berenang • MT normal</p></div><h3>💊 Tatalaksana</h3><ul><li><strong>Terapi topikal — kunci utama:</strong> Tetes telinga antibiotik + steroid: Ofloksasin 0.3% tetes 3-4×/hari ATAU Hidrokortison-Neomisin-Polimiksin B tetes 3×/hari 7-10 hari</li><li>Jika edema berat: Pasang tampon/wick yang dibasahi tetes telinga</li><li>Analgesik oral parasetamol</li><li>Jangan membersihkan dengan cotton bud! Jaga telinga tetap kering saat mandi</li></ul></div>'}
]},
{id:2,name:"Serumen Prop",pages:[
{title:"Skenario",step:"IPM-1",content:'<div class="section"><h3>🏥 Skenario</h3><p>Seorang laki-laki, 55 tahun, datang dengan keluhan telinga kanan terasa penuh, pendengaran berkurang (seperti tertutup) sejak 2 bulan. Kadang telinga berdenging (tinnitus). Pasien sering membersihkan telinga dengan cotton bud setiap hari. Riwayat: bekerja di lingkungan berdebu. Tidak ada nyeri atau demam.</p></div>'},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:'<div class="section"><h3>🔍 Gejala & Pemeriksaan</h3><ul><li>Conductive hearing loss ringan-sedang — rasa penuh/fullness di telinga</li><li>Tinnitus (denging) — karena sumbatan serumen</li><li>Otalgia (-) tapi kadang rasa tidak nyaman</li><li><strong>Otoskopi:</strong> Massa serumen berwarna coklat-hitam menutup liang telinga dan/atau membrana timpani</li></ul><div class="media-box" style="background:#e8f6f3;border-color:#16a085;margin-top:8px"><h4 style="color:#16a085">Diagnosis: Serumen Prop Dekstra</h4><p>ICD-10: H61.2 • Sumbatan serumen total • CHL</p></div><h3>💊 Tatalaksana</h3><ul><li><strong>Ekstraksi mekanik:</strong> Sendok serumen (cerumen spoon) atau kuret — jika serumen keras, beri tetes pelunak (NaHCO3 5% atau minyak mineral) 3-5 hari sebelumnya</li><li><strong>Irigasi telinga:</strong> Air hangat (37°C) semprot — kontraindikasi: perforasi MT, OMA, otitis eksterna</li><li><strong>Jangan gunakan cotton bud!</strong> — mendorong serumen lebih dalam</li><li>Edukasi: Serumen adalah proteksi alami. Bersihkan hanya bagian luar dengan handuk. Jika ada riwayat perforasi MT, jangan irigasi.</li></ul></div>'}
]},
{id:3,name:"Rinitis Alergi",pages:[
{title:"Skenario",step:"IPM-1",content:'<div class="section"><h3>🏥 Skenario</h3><p>Seorang mahasiswi, 20 tahun, datang dengan keluhan bersin-bersin beruntun (20+ kali), hidung gatal dan meler (rinore encer) sejak 2 minggu. Keluhan muncul setiap pagi saat membersihkan rumah/buku berdebu. Mata juga gatal dan berair. Riwayat: asma ringan. Gejala mereda saat di luar rumah.</p></div>'},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:'<div class="section"><h3>🔍 Gejala & Pemeriksaan</h3><ul><li><strong>Trias klasik:</strong> Bersin beruntun (paroksismal), rinore encer, hidung tersumbat</li><li>Gatal hidung, mata, palatum, dan tenggorok</li><li>Gejala pagi hari lebih berat — pencetus: debu rumah (tungau), serbuk sari, bulu hewan</li><li><strong>Pemeriksaan:</strong> Konka inferior edema + pucat/livide (bukan merah seperti infeksi), sekret encer, mukosa nasal pucat</li><li>Allergic salute (+): Garis horisontal di hidung akibat sering mengusap</li></ul><div class="media-box" style="background:#e8f6f3;border-color:#16a085;margin-top:8px"><h4 style="color:#16a085">Diagnosis: Rinitis Alergi Presisten Sedang-Berat</h4><p>ICD-10: J30.4 • Bersin pagi + rinore + gatal • Pencetus debu</p></div><h3>💊 Tatalaksana</h3><ul><li><strong>Antihistamin oral:</strong> Loratadin 10 mg/hari ATAU Cetirizin 10 mg/hari — untuk gatal + bersin</li><li><strong>Semprot hidung steroid (INCS):</strong> Mometason furoat 50 mcg/spray 2 spray tiap lubang 1-2×/hari — gold standard untuk inflamasi</li><li>Hindari alergen: Cuci sprei air panas, vacuum, tutup kasur anti-tungau, hindari hewan</li><li>Jika &gt;6 th: Imunoterapi alergen (rujuk spesialis) — kuratif jangka panjang</li></ul></div>'}
]},
{id:4,name:"Faringitis Akut",pages:[
{title:"Skenario",step:"IPM-1",content:'<div class="section"><h3>🏥 Skenario</h3><p>Seorang laki-laki, 25 tahun, datang dengan keluhan nyeri tenggorok saat menelan (odinofagia) sejak 3 hari. Demam 38°C, badan lemas, dan nyeri sendi. Tenggorokan terlihat merah dan ada bercak putih di tonsil. Riwayat: tidak ada batuk/pilek — sakit tenggorok muncul tiba-tiba.</p></div>'},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:'<div class="section"><h3>🔍 Gejala & Pemeriksaan</h3><ul><li><strong>Odinofagia (nyeri telan)</strong> — bisa sampai susah menelan air liur</li><li>Demam, sakit kepala, malaise</li><li>Nyeri leher (limfadenitis servikal)</li><li><strong>Faringitis viral:</strong> Konjungtivitis, batuk, pilek, suara serak, ulkus oral</li><li><strong>Faringitis streptokokus (group A):</strong> Onset akut, demam &gt;38.5°C, eksudat tonsil, nyeri leher, tidak batuk — <strong>Centor score</strong></li></ul><div class="media-box" style="background:#e8f6f3;border-color:#16a085;margin-top:8px"><h4 style="color:#16a085">Diagnosis: Faringitis Akut (Viral/Bakteri)</h4><p>ICD-10: J02.9 • Centor 3/4 (demam, eksudat, limfadenopati, tanpa batuk) → kemungkinan Strep A</p></div><h3>💊 Tatalaksana</h3><ul><li><strong>Viral (Centor ≤2):</strong> Parasetamol, istirahat, madu/air hangat untuk tenggorok</li><li><strong>Strep A (Centor ≥3):</strong> Amoksisilin 500 mg 3×/hari 10 hari ATAU Penisilin V 3×500 mg/hari ATAU Benzatin Penisilin 1.2 jt IU IM dosis tunggal</li><li><strong>Alergi penisilin:</strong> Eritromisin 500 mg 4×/hari 10 hari atau Klindamisin 300 mg 3×/hari</li><li>Kontrol 48 jam: Jika tidak membaik dengan AB → curigai virus/komplikasi (abses peritonsiler)</li></ul></div>'}
]},
{id:5,name:"Tonsilitis Akut",pages:[
{title:"Skenario",step:"IPM-1",content:'<div class="section"><h3>🏥 Skenario</h3><p>Seorang anak, 8 tahun, datang dengan demam tinggi 39°C, nyeri tenggorok hebat, dan sulit menelan (makan/minum susah). Suara bindeng (hot potato voice). Tonsil tampak bengkak merah dengan bercak putih (detritus). Leher bengkak di sudut rahang (limfadenitis). Riwayat: sering tonsilitis berulang 4-5×/tahun.</p></div>'},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:'<div class="section"><h3>🔍 Gejala & Pemeriksaan</h3><ul><li>Odinofagia berat — sulit menelan cairan sekalipun</li><li>Demam &gt;38°C, malaise, sakit kepala</li><li><strong>Hot potato voice:</strong> Suara seperti mengunyah kentang panas</li><li><strong>Pemeriksaan orofaring:</strong> Tonsil membesar (T1-T4), hiperemis, detritus putih-kuning (eksudat) di kriptus, dapat konfluen</li><li>Limfadenitis servikal anterior bilateral</li></ul><div class="media-box" style="background:#e8f6f3;border-color:#16a085;margin-top:8px"><h4 style="color:#16a085">Diagnosis: Tonsilitis Akut Bilateral — Grade T2-T3</h4><p>ICD-10: J03.9 • Tonsil hiperemis + detritus • Demam • Limfadenitis</p></div><h3>💊 Tatalaksana</h3><ul><li><strong>Antibiotik:</strong> Amoksisilin 50 mg/kg/hari 3×/hari 10 hari ATAU Penisilin V 3×500 mg/hari. Alergi: Eritromisin 30-50 mg/kg/hari</li><li><strong>Analgesik:</strong> Parasetamol/ibuprofen — kontrol nyeri dan demam</li><li><strong>Indikasi tonsilektomi:</strong> Jika &gt;7×/tahun, atau &gt;5×/tahun 2 tahun berturut-turut, atau komplikasi (abses, gagal napas)</li><li>Edukasi: Minum banyak, makanan lunak/dingin, istirahat</li></ul></div>'}
]},
{id:6,name:"Sinusitis Maksilaris",pages:[
{title:"Skenario",step:"IPM-1",content:'<div class="section"><h3>🏥 Skenario</h3><p>Seorang perempuan, 35 tahun, datang dengan keluhan nyeri di wajah sisi kanan (pipi dan sekitar mata) sejak 10 hari, demam 38°C, hidung tersumbat, dan pilek kental kuning-hijau. Nyeri bertambah saat membungkuk ke depan. Keluhan muncul setelah pilek yang tidak sembuh setelah 2 minggu. Riwayat: alergi debu dan asma.</p></div>'},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:'<div class="section"><h3>🔍 Gejala & Pemeriksaan</h3><ul><li>Nyeri tekan di area sinus (maksilaris: pipi, frontalis: dahi) — memberat saat membungkuk</li><li>Rinore purulen (hijau/kental) — dari hidung atau postnasal drip</li><li>Demam, malaise, sakit kepala</li><li>Hidung tersumbat, gangguan penciuman (hiposmia)</li><li><strong>Transiluminasi:</strong> Sinus maksilaris gelap (redam) — pada sinusitis</li><li><strong>Nasoendoskopi:</strong> Mukosa hiperemis, edema, sekret purulen dari meatus medius</li></ul><div class="media-box" style="background:#e8f6f3;border-color:#16a085;margin-top:8px"><h4 style="color:#16a085">Diagnosis: Sinusitis Maksilaris Akut Dekstra</h4><p>ICD-10: J01.0 • Nyeri pipi + rinore purulen + post-ISPA</p></div><h3>💊 Tatalaksana</h3><ul><li><strong>Antibiotik (jika &gt;10 hari):</strong> Amoksisilin-klavulanat 3×625 mg/hari 10 hari ATAU Sefaleksin 3×500 mg/hari</li><li><strong>Dekongestan topikal:</strong> Oksimetazolin semprot 0.05% maks 3 hari (jauhkan &gt;7 hari!)</li><li><strong>Analgesik:</strong> Parasetamol/NSAID</li><li>Irigasi hidung NaCl 0.9% 2×/hari</li><li>Rujuk THT jika: kronik (&gt;12 minggu), komplikasi orbital/intrakranial, obstruksi total</li></ul></div>'}
]},
{id:7,name:"Abses Peritonsiler",pages:[
{title:"Skenario",step:"IPM-1",content:'<div class="section"><h3>🏥 Skenario</h3><p>Seorang laki-laki, 22 tahun, datang ke IGD dengan nyeri tenggorok hebat sebelah kanan, sulit membuka mulut (trismus), suara bindeng (hot potato voice), dan demam 39°C. Keluhan muncul setelah tonsilitis 1 minggu yang tidak diobati. Pasien tidak bisa menelan liurnya sendiri dan mengeluarkan air liur (drooling).</p></div>'},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:'<div class="section"><h3>🔍 Gejala & Pemeriksaan</h3><ul><li><strong>Trismus (kesulitan buka mulut):</strong> Spasme otot pterigoid — tanda khas!</li><li>Odinofagia berat + drooling (ngiler)</li><li>Demam tinggi + malaise + suara bindeng</li><li><strong>Pemeriksaan:</strong> Tonsil asimetris — tonsil kanan terdorong ke medial dan inferior, uvula terdorong ke kontralateral (kiri) — patognomonis!</li><li>Lokasi abses di jaringan peritonsiler (kapsul tonsil dan konstriktor faring superior)</li></ul><div class="media-box" style="background:#e8f6f3;border-color:#16a085;margin-top:8px"><h4 style="color:#16a085">Diagnosis: Abses Peritonsiler Dekstra</h4><p>ICD-10: J36 • Trismus • Uvula terdorong • Post-tonsilitis</p></div><h3>💊 Tatalaksana</h3><ul><li><strong>RUJUK ke THT!</strong> — butuh insisi drainase atau aspirasi jarum</li><li><strong>Antibiotik:</strong> Amoksisilin-klavulanat IV atau Sefalosporin generasi III + Metronidazol</li><li><strong>Analgesik + antipiretik</strong> — full dosis</li><li><strong>Di FKTP:</strong> Stabilisasi + rujuk segera. Jangan ditunda!</li><li>Kriteria rujuk: sumbatan jalan napas, dehidrasi, sepsis, perlu drainase</li></ul></div>'}
]},
{id:8,name:"Epistaksis",pages:[
{title:"Skenario",step:"IPM-1",content:'<div class="section"><h3>🏥 Skenario</h3><p>Seorang laki-laki, 45 tahun, datang ke IGD dengan mimisan sejak 1 jam yang lalu. Darah keluar dari lubang hidung kanan. Pasien punya riwayat hipertensi (TD 170/100 mmHg). Pasien juga sering mimisan akhir-akhir ini. Darah segar keluar aktif, pasien gelisah. Tidak ada riwayat trauma atau gangguan koagulasi.</p></div>'},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:'<div class="section"><h3>🔍 Jenis Epistaksis</h3><ul><li><strong>Anterior (90%):</strong> Pleksus Kiesselbach/Little\'s area — pada septum anterior. Darah mengalir ke luar lubang hidung. Biasanya ringan-sedang</li><li><strong>Posterior (10%):</strong> Arteri sfenopalatina — darat mengalir ke tenggorok (postnasal drip). Sulit dihentikan, sering pada lansia/hipertensi</li></ul><div class="media-box" style="background:#e8f6f3;border-color:#16a085;margin-top:8px"><h4 style="color:#16a085">Diagnosis: Epistaksis Anterior Dekstra ec Hipertensi</h4><p>ICD-10: R04.0 • Sumber anterior • TD 170/100</p></div><h3>💊 Tatalaksana</h3><ul><li><strong>Pertolongan pertama:</strong> Duduk tegak, condong ke depan, kompres dingin pangkal hidung, tekan cuping hidung 10-15 menit</li><li><strong>Kauterisasi:</strong> Dengan AgNO3 (perak nitrat) — untuk sumber anterior yang tampak</li><li><strong>Tampon anterior:</strong> Kassa vaselin atau spon nasal — jika kauter gagal</li><li><strong>Tampon posterior (balon Foley):</strong> Jika gagal tampon anterior — rujuk THT!</li><li><strong>Kontrol TD:</strong> Turunkan hipertensi</li><li>Rujuk THT jika: epistaksis posterior, gagal tampon, rekuren sering, syok hipovolemik</li></ul></div>'}
]},
{id:9,name:"Benda Asing Hidung",pages:[
{title:"Skenario",step:"IPM-1",content:'<div class="section"><h3>🏥 Skenario</h3><p>Seorang anak, 3 tahun, dibawa ibunya dengan keluhan hidung kiri berbau busuk (foul odor) dan keluar cairan kental hijau (rinore purulen unilateral) sejak 2 minggu. Ibu menduga anaknya memasukkan kacang tanah ke hidung 1 bulan lalu. Tidak ada demam atau nyeri. Nafas anak berbau tidak sedap.</p></div>'},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:'<div class="section"><h3>🔍 Gejala & Pemeriksaan</h3><ul><li><strong>Tanda patognomonis:</strong> Rinore purulen unilateral + bau busuk (rhinolith/aliran hidung satu sisi)</li><li>Benda asing di hidung: Biji, manik, kacang, mainan kecil, baterai (darurat korosif)</li><li>Jika lama: Rhinolith (endapan kalsium di sekitar benda asing), ulserasi, perforasi septum</li><li>Pada anak: curigai jika ada rinore purulen unilateral yang tidak sembuh</li><li><strong>Pemeriksaan:</strong> Spekulum hidung/kaca kepala → lihat benda asing di meatus inferior/komunis</li></ul><div class="media-box" style="background:#e8f6f3;border-color:#16a085;margin-top:8px"><h4 style="color:#16a085">Diagnosis: Benda Asing Hidung Kiri (curiga kacang tanah)</h4><p>ICD-10: T17.1 • Rinore unilateral + bau</p></div><h3>💊 Tatalaksana</h3><ul><li><strong>Ekstraksi:</strong> Pakai kuret/suction/forsep (gaya hidup KISS — gunakan forsep alligator) — pada anak, restrain atau sedasi ringan</li><li><strong>Jangan mendorong!</strong> Risiko aspirasi → batuk → tersedak</li><li>Jika baterai: Emergency — karena kebocoran alkali menyebabkan nekrosis, harus segera dikeluarkan!</li><li>Jika benda asing sudah lama & ada rhinolith → rujuk THT</li><li>Edukasi: Jaga mainan kecil dari jangkauan anak &lt;3 tahun</li></ul></div>'}
]},
{id:10,name:"Vertigo (BPPV)",pages:[
{title:"Skenario",step:"IPM-1",content:'<div class="section"><h3>🏥 Skenario</h3><p>Seorang perempuan, 50 tahun, datang dengan keluhan pusing berputar (vertigo) mendadak saat bangun tidur dan menoleh ke kiri di tempat tidur. Vertigo berlangsung 20-30 detik, disertai mual dan muntah. Tidak ada tinitus atau gangguan dengar. Pasien merasa takut akan jatuh. Riwayat: hipertensi terkontrol, migrain (-). Gejala hilang jika diam dan tidak bergerak.</p></div>'},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:'<div class="section"><h3>🔍 Gejala & Pemeriksaan</h3><ul><li><strong>Vertigo posisi:</strong> Dipicu perubahan posisi kepala (bangun tidur, menengok, membungkuk). Durasi &lt;60 detik</li><li>Nistagmus posisional (rotary/geotropic) saat manuver Dix-Hallpike</li><li>Mual/muntah, rasa melayang, gangguan keseimbangan</li><li>Penyebab: Kanalolithiasis — otokonia lepas dari utrikulus ke kanalis semisirkularis posterior</li></ul><div class="media-box" style="background:#e8f6f3;border-color:#16a085;margin-top:8px"><h4 style="color:#16a085">Diagnosis: Benign Paroxysmal Positional Vertigo (BPPV)</h4><p>ICD-10: H81.1 • Vertigo posisional &lt;60 detik • Dix-Hallpike (+) • Tanpa gangguan dengar</p></div><h3>💊 Tatalaksana</h3><ul><li><strong>Epley maneuver (kanalith repositioning):</strong> Langkah-langkah: Duduk → baring ke sisi sakit → tengok 45°→ putar ke sisi sehat 90°→ putar 135°→ duduk tegak — tahan tiap posisi 30 detik</li><li><strong>Farmakoterapi:</strong> Betahistin 6-24 mg 3×/hari (sampai gejala reda) ATAU dimenhidrinat 50 mg 3×/hari (akut) — hanya untuk vertigo berat</li><li>Edukasi: Vertigo akan membaik dengan manuver reposisi. Hindari gerakan kepala mendadak. Jangan menyetir saat vertigo.</li></ul></div>'}
]},
{id:11,name:"Laringitis Akut",pages:[
{title:"Skenario",step:"IPM-1",content:'<div class="section"><h3>🏥 Skenario</h3><p>Seorang guru, 30 tahun, datang dengan keluhan suara serak (disfonia) total sejak 3 hari setelah mengajar nonstop 6 jam. Tenggorokan kering dan sakit saat bicara. Batuk kering, kadang berdahak sedikit jernih. Tidak demam. Pasien sering berteriak di kelas karena murid ramai.</p></div>'},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:'<div class="section"><h3>🔍 Gejala & Pemeriksaan</h3><ul><li>Suara serak atau hilang sama sekali (afonia)</li><li>Tenggorokan kering, gatal, atau nyeri ringan saat bicara</li><li>Batuk kering atau berdahak</li><li>Biasanya post-ISPA atau pemakaian suara berlebihan (vocal strain)</li><li><strong>Laringoskopi:</strong> Pita suara hiperemis, edema, kadang nodul/hematoma (jika kronis)</li></ul><div class="media-box" style="background:#e8f6f3;border-color:#16a085;margin-top:8px"><h4 style="color:#16a085">Diagnosis: Laringitis Akut (Vocal Cord Strain)</h4><p>ICD-10: J04.0 • Disfonia + post-vocal overuse • Tidak demam</p></div><h3>💊 Tatalaksana</h3><ul><li><strong>Vocal rest:</strong> Jangan berbicara/bisik — maks 1-2 hari total, lalu bicara minimal 3-5 hari</li><li><strong>Hidrasi:</strong> Minum air hangat, uap air hangat, hindari kafein & alkohol</li><li><strong>Inhalasi uap:</strong> Uap air + mentol 2-3×/hari</li><li><strong>Medikamentosa:</strong> Istirahat saja, tidak perlu antibiotik (viral). Jika perlu: antiinflamasi (ibuprofen) + antitusif</li><li>Edukasi: Jangan berbisik (lebih keras pada pita suara). Gunakan alat pengeras suara saat mengajar.</li></ul></div>'}
]},
{id:12,name:"Parotitis",pages:[
{title:"Skenario",step:"IPM-1",content:'<div class="section"><h3>🏥 Skenario</h3><p>Seorang anak laki-laki, 5 tahun, dibawa ibunya dengan pipi bengkak di kedua sisi sejak 2 hari. Bengkak di depan telinga, nyeri saat mengunyah, demam 38.5°C. Anak sudah diimunisasi MMR 1 kali. Di sekolah ada teman yang juga bengkak pipi. Nafsu makan turun karena nyeri kunyah.</p></div>'},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:'<div class="section"><h3>🔍 Gejala & Pemeriksaan</h3><ul><li>Pembengkakan parotis bilateral (pre-aurikuler) — earlobe terangkat, batas rahang kabur</li><li>Nyeri saat mengunyah (trismus ringan)</li><li>Demam, sakit kepala, malaise</li><li>Penyebab tersering: Virus Paramyxovirus (Mumps/gondongan). Bakteri: Staph aureus (parotitis supuratif — unilateral, pus keluar dari duktus Stensen)</li><li><strong>Komplikasi:</strong> Orkitis (pada puber), ooforitis, meningitis, pankreatitis, ketulian</li></ul><div class="media-box" style="background:#e8f6f3;border-color:#16a085;margin-top:8px"><h4 style="color:#16a085">Diagnosis: Parotitis (Gondongan/Mumps) — Viral Bilateral</h4><p>ICD-10: B26.9 • Bengkak pre-aurikuler • Demam • Riwayat kontak</p></div><h3>💊 Tatalaksana</h3><ul><li><strong>Suportif:</strong> Parasetamol 10-15 mg/kg/dosis 4-6 jam (antipiretik + analgesik)</li><li>Kompres hangat/diingin pada area bengkak</li><li>Makanan lunak — kurangi stimulasi kunyah</li><li>Isolasi: 9 hari setelah onset bengkak (masa menular)</li><li>**Lengkapi imunisasi MMR (2 dosis) — efektifitas 88%</li></ul></div>'}
]},
{id:13,name:"OMA & OMSK",pages:[
{title:"Skenario",step:"IPM-1",content:'<div class="section"><h3>🏥 Skenario</h3><p>Seorang perempuan, 25 tahun, datang dengan keluhan telinga kanan keluar cairan (otorhea) sejak 2 minggu. Cairan kuning kental, kadang berbau. Pendengaran berkurang sejak SD. Riwayat: sering sakit telinga saat kecil, dan sering kambuh. Tidak ada nyeri atau demam. Gendang telinga kanan ada lubang (perforasi) pada pemeriksaan.</p></div>'},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:'<div class="section"><h3>🔍 OMA vs OMSK</h3><div class="media-box"><table><tr style="background:#16a085;color:#fff"><th>Parameter</th><th>OMA</th><th>OMSK</th></tr><tr><td>Onset</td><td>Akut (&lt;3 mg)</td><td>Kronis (&gt;2 bln)</td></tr><tr><td>Nyeri</td><td style="color:#c0392b">(+)</td><td>(-) kecuali eksaserbasi</td></tr><tr><td>Demam</td><td style="color:#c0392b">(+)</td><td>(-)</td></tr><tr><td>Perforasi MT</td><td>Bisa ada (akut)</td><td style="color:#c0392b">(+) permanen</td></tr><tr><td>Sekret</td><td>Purulen</td><td>Mukoid/purulen, bau</td></tr></table></div>
<div class="media-box" style="background:#e8f6f3;border-color:#16a085;margin-top:8px"><h4 style="color:#16a085">Diagnosis: Otitis Media Supuratif Kronik (OMSK) Benigna Dekstra</h4><p>ICD-10: H66.1 • Perforasi MT sentral • Otorhea berulang • CHL</p></div><h3>💊 Tatalaksana</h3><ul><li><strong>ANA (Aturan Tidak Berenang & Tidak Mengorek):</strong> Jaga telinga tetap kering. Jangan berenang. Tutup kapas beri vaselin saat mandi</li><li><strong>Tetes telinga antibiotik:</strong> Ofloksasin 0.3% tetes 3×/hari 7-14 hari (selama otorhea)</li><li><strong>Lakukan aural toilet:</strong> Bersihkan sekret dari liang telinga dengan suction/pengisap</li><li>Rujuk THT: Untuk timpanoplasti (tutup perforasi) jika kering &gt;3 bulan</li></ul></div>'}
]},
{id:14,name:"Presbikusis",pages:[
{title:"Skenario",step:"IPM-1",content:'<div class="section"><h3>🏥 Skenario</h3><p>Seorang laki-laki, 70 tahun, datang dengan keluhan kurang dengar progresif di kedua telinga sejak 3 tahun. Kesulitan mendengar percakapan terutama di tempat ramai (misalnya restoran), dan suara tinggi wanita/anak lebih sulit didengar. Pasien sering minta diulang saat bicara. Tidak ada tinitus, demam, atau nyeri. Riwayat: bekerja di pabrik tekstil bising selama 30 tahun.</p></div>'},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:'<div class="section"><h3>🔍 Gejala & Pemeriksaan</h3><ul><li><strong>SNHL bilateral simetris:</strong> Sensorineural hearing loss — frekuensi tinggi lebih dulu hilang</li><li>Kesulitan membedakan konsonan (f, s, t) dalam percakapan</li><li>Recruitment (peningkatan sensitivitas suara keras) — suara normal "katanya kurang, tapi yang keras bising sekali"</li><li>Tinnitus sering menyertai</li><li>Penyebab: Degenerasi koklea terkait usia + noise-induced (presbikusis + NIHL)</li><li><strong>Pemeriksaan:</strong> Tes garpu: Rinne (+) bilateral, Weber lateral ke telinga yang lebih baik. Audiometri: SNHL frekuensi tinggi bilateral</li></ul><div class="media-box" style="background:#e8f6f3;border-color:#16a085;margin-top:8px"><h4 style="color:#16a085">Diagnosis: Presbikusis Bilateral (Sensorineural Hearing Loss)</h4><p>ICD-10: H91.1 • SNHL frekuensi tinggi • Usia 70 th • Riwayat bising</p></div><h3>💊 Tatalaksana</h3><ul><li><strong>Alat bantu dengar (hearing aid):</strong> Satu-satunya terapi efektif — rujuk THT untuk fitting</li><li>Konseling: Gunakan komunikasi visual (tatap muka), bicara jelas & agak lambat</li><li>Lindungi sisa pendengaran: Gunakan earplug di lingkungan bising</li><li>Jika sangat berat: Pertimbangkan implan koklea (rujuk spesialis THT)</li><li>Edukasi: Presbikusis tidak bisa disembuhkan tapi bisa direhabilitasi</li></ul></div>'}
]}
];

// ENGINE SAME AS PREVIOUS
let currentDisease=0,currentPage=0,isFlipping=false;
function init(){const l=document.getElementById('diseaseList');DISEASES.forEach((d,i)=>{const li=document.createElement('li');li.innerHTML='<span class="num">'+(i+1)+'</span><span class="name">'+d.name+'</span>';li.onclick=()=>goToDisease(i);li.id='disease-'+i;l.appendChild(li);});loadDisease(0);}
function goToDisease(i){if(isFlipping)return;currentDisease=i;currentPage=0;loadDisease(i);document.querySelectorAll('.disease-list li').forEach(l=>l.classList.remove('active'));document.getElementById('disease-'+i).classList.add('active');}
function loadDisease(i){const d=DISEASES[i];const b=document.getElementById('flipbook');b.innerHTML='';d.pages.forEach((p,j)=>{const dv=document.createElement('div');dv.className='page'+(j===0?' active':'');dv.id='page-'+i+'-'+j;dv.innerHTML='<div class="page-header"><span class="step">'+p.step+'</span><span class="ptitle">'+p.title+'</span></div>'+p.content;b.appendChild(dv);});updateUI();}
function updateUI(){const d=DISEASES[currentDisease];document.getElementById('flipTitle').textContent=d.name;document.getElementById('flipBadge').textContent=(currentDisease+1)+'/'+DISEASES.length;document.getElementById('pageNum').textContent=currentPage+1;document.getElementById('pageTotal').textContent=d.pages.length;document.getElementById('prevBtn').disabled=currentPage===0;document.getElementById('nextBtn').disabled=currentPage===d.pages.length-1;document.querySelectorAll('.page').forEach((e,i)=>e.classList.toggle('active',i===currentPage));}
function nextPage(){if(isFlipping||currentPage>=DISEASES[currentDisease].pages.length-1)return;isFlipping=true;const o=document.getElementById('page-'+currentDisease+'-'+currentPage);o.classList.add('flip-out');setTimeout(()=>{o.classList.remove('active','flip-out');currentPage++;document.getElementById('page-'+currentDisease+'-'+currentPage).classList.add('flip-in');updateUI();setTimeout(()=>{document.getElementById('page-'+currentDisease+'-'+currentPage).classList.remove('flip-in');isFlipping=false;},400);},300);}
function prevPage(){if(isFlipping||currentPage<=0)return;isFlipping=true;const o=document.getElementById('page-'+currentDisease+'-'+currentPage);o.style.animation='flipOut .5s ease reverse';setTimeout(()=>{o.classList.remove('active');o.style.animation='';currentPage--;document.getElementById('page-'+currentDisease+'-'+currentPage).classList.add('active');updateUI();setTimeout(()=>{isFlipping=false;},300);},300);}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown')nextPage();if(e.key==='ArrowLeft'||e.key==='ArrowUp')prevPage();});
document.addEventListener('DOMContentLoaded',init);
</script>
</body></html>
