<script>
const DISEASES=[
{id:0,name:"Osteoartritis",pages:[
{title:"Skenario",step:"IPM-1",content:'<div class="section"><h3>🏥 Skenario</h3><p>Seorang perempuan, 65 tahun, datang dengan keluhan nyeri lutut kanan saat berjalan dan naik tangga sejak 5 tahun, memberat dalam 3 bulan terakhir. Nyeri berkurang dengan istirahat. Pasien juga merasa kaku sendi &lt;30 menit setelah bangun tidur (morning stiffness). Lutut berbunyi "krek" saat digerakkan. Riwayat: obesitas (BMI 32), pekerjaan dulu sebagai kuli gendong di pasar. Tidak demam, tidak merah.</p></div><div class="media-box"><svg viewBox="0 0 380 80"><rect width="380" height="80" fill="#fef9e7" rx="10"/><text x="190" y="18" text-anchor="middle" fill="#e67e22" font-weight="700" font-size="13">OSTEOARTRITIS — DEGENERATIF SENDI</text><text x="190" y="36" text-anchor="middle" fill="#555" font-size="9">Kartilago sendi menipis → Inflamasi ringan → Nyeri mekanik + krepitasi</text><text x="190" y="52" text-anchor="middle" fill="#555" font-size="9">Lutut (genu OA), panggul (coxae OA), tangan (DIP/PIP joints)</text><text x="190" y="70" text-anchor="middle" fill="#999" font-size="9">Gambar 1 — Patofisiologi OA: degradasi kartilago artikular</text></svg></div>'},
{title:"Gejala & Pemeriksaan",step:"IPM-2-5",content:'<div class="section"><h3>🔍 Gejala Klinis</h3><ul><li><strong>Nyeri mekanik:</strong> Nyeri saat beraktivitas, membaik dengan istirahat — nyeri pagi hari &lt;30 menit</li><li>Stiffness (kaku) setelah inaktivitas (gelling phenomenon)</li><li>Krepitasi: bunyi "krek-krek" saat sendi digerakkan — akibat permukaan sendi aus</li><li>Hilangnya ROM (range of motion) — sendi kaku progresif</li><li>Keterbatasan fungsional (sulit jongkok, jalan jauh)</li></ul><h3>🩺 Pemeriksaan Fisik</h3><ul><li><strong>Inspeksi:</strong> Pembesaran sendi (osteofit) — Heberden node (DIP), Bouchard node (PIP). Pada genu: varus/valgus deformity</li><li><strong>Palpasi:</strong> Nyeri tekan sepanjang garis sendi, efusi minimal, hangat (-), krepitasi (+)</li><li><strong>ROM:</strong> Fleksi terbatas, ekstensi kadang terbatas</li><li><strong>Test khusus:</strong> Patellar grind test (+) (OA patellofemoral)</li></ul></div>'},
{title:"Diagnosis & Tatalaksana",step:"IPM-6-12",content:'<div class="section"><h3>🔬 Radiologi (Kriteria Kellgren-Lawrence)</h3><ul><li>Grade 1: Penyempitan sendi ringan, osteofit kecil</li><li>Grade 2: Osteofit jelas, penyempitan ringan</li><li>Grade 3: Penyempitan sedang, osteofit multipel, subkondral sklerosis</li><li>Grade 4: Penyempitan berat, deformitas, kista subkondral</li></ul><div class="media-box" style="background:#fef9e7;border-color:#e67e22"><h4 style="color:#e67e22">Diagnosis: Osteoartritis Genu Dekstra — Grade 3 (Kellgren-Lawrence)</h4><p>ICD-10: M17.1 • Nyeri mekanik + krepitasi + osteofit radiologis • Usia 65 th</p></div><h3>💊 Tatalaksana</h3><ul><li><strong>Non-farmakologi (fondasi):</strong> Turunkan BB (target BMI &lt;27), latihan penguatan kuadrisep, fisioterapi, akitivitas low-impact (renang, sepeda)</li><li><strong>Farmakologi:</strong> Parasetamol lini pertama ATAU NSAID (Ibuprofen 400 mg 3×/hari ATAU Meloksikam 7.5-15 mg/hari) — hati-hati ginjal & lambung</li><li><strong>Topikal:</strong> Diklofenak gel / Metil salisilat</li><li><strong>Glukosamin + Kondroitin:</strong> Efek simptomatik ringan (SYSADOA)</li><li><strong>Injeksi intra-artikular:</strong> Asam hialuronat atau steroid — rujuk spesialis</li><li>Rujuk bedah ortopedi: Jika nyeri menetap & kualitas hidup buruk → pertimbangkan operasi penggantian sendi (TKA)</li></ul></div>'}
]},
{id:1,name:"Low Back Pain",pages:[
{title:"Skenario",step:"IPM-1",content:'<div class="section"><h3>🏥 Skenario</h3><p>Seorang laki-laki, 35 tahun, datang dengan nyeri punggung bawah sejak 2 minggu setelah mengangkat beban berat di gudang. Nyeri di daerah pinggang, menjalar ke bokong tapi tidak sampai lutut/kaki. Nyeri memberat saat duduk lama atau membungkuk. Istirahat meredakan. Tidak ada demam, penurunan BB, atau gangguan BAK/BAB. Pasien sering duduk &gt;8 jam/hari kerja di kantor.</p></div>'},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:'<div class="section"><h3>🔍 Gejala & Pemeriksaan</h3><ul><li><strong>Red flags (tanda bahaya):</strong> Demam, penurunan BB, riwayat kanker, &gt;50 th, trauma berat, retensi urin, defisit neurologis progresif</li><li><strong>Pemeriksaan fisik:</strong> Nyeri tekan otot paravertebral lumbal, spasme otot, ROM lumbal terbatas (fleksi nyeri)</li><li><strong>Test provokasi:</strong> Straight Leg Raise (SLR) &gt;70° — normal (jika &lt;60° → radikulopati)</li><li>Refleks, sensasi, dan motorik tungkai normal (tanda radikulopati -)</li></ul><div class="media-box" style="background:#fef9e7;border-color:#e67e22"><h4 style="color:#e67e22">Diagnosis: Low Back Pain Mekanik Akut (Non-Spesifik)</h4><p>ICD-10: M54.5 • Tanpa radikulopati • Red flags (-)</p></div><h3>💊 Tatalaksana</h3><ul><li><strong>Tetap aktif!</strong> — tirah baring &gt;48 jam justru memperburuk</li><li><strong>Analgesik:</strong> Parasetamol 500-1000 mg 3×/hari ATAU Ibuprofen 400 mg 3×/hari ATAU Naproksen 500 mg 2×/hari — 5-7 hari</li><li><strong>Relaksan otot:</strong> Jika spasme berat — Tiokolkikosida 4 mg 3×/hari ATAU Diazepam 2 mg 1-2×/hari (hati-hati sedasi)</li><li>Kompres hangat, fisioterapi, latihan peregangan dan penguatan core</li><li>Edukasi: Postur kerja yang benar, angkat beban dengan kaki, kursi ergonomis, olahraga rutin</li><li>Jika sampai &gt;6 minggu → rujuk ke ortopedi/saraf/rehab medik</li></ul></div>'}
]},
{id:2,name:"Gout Artritis",pages:[
{title:"Skenario",step:"IPM-1",content:'<div class="section"><h3>🏥 Skenario</h3><p>Seorang laki-laki, 45 tahun, datang dengan nyeri sendi ibu jari kaki kanan hebat onset tiba-tiba tengah malam (membangunkan tidur). Sendi merah, bengkak, panas, dan sangat nyeri — bahkan disentuh selimut pun sakit (allodynia). Demam 38°C. Riwayat: sering makan jeroan, tahu tempe, dan minum alkohol. Kadar asam urat 12 mg/dL (belum pernah diobati).</p></div>'},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:'<div class="section"><h3>🔍 Gejala & Pemeriksaan</h3><ul><li><strong>Podagra:</strong> Monoartritis ibu jari kaki — &gt;50% serangan pertama di sini!</li><li>Onset akut (&lt;24 jam), sangat nyeri, "door cannot even touch the sheet"</li><li>Monoartritis: Ibu jari kaki → lutut → pergelangan → siku</li><li>Faktor pencetus: Alkohol, makanan purin, trauma, dehidrasi, obat diuretik</li><li>Pemeriksaan: Sendi MTP1 kanan eritema + edema + hangat + nyeri tekan sangat (+)</li><li>Asam urat: &gt;7 mg/dL (pria) atau &gt;6 mg/dL (wanita)</li></ul><div class="media-box" style="background:#fef9e7;border-color:#e67e22"><h4 style="color:#e67e22">Diagnosis: Gout Artritis Akut — Podagra</h4><p>ICD-10: M10.0 • Monoartritis MTP1 • Asam urat 12 mg/dL</p></div><h3>💊 Tatalaksana</h3><ul><li><strong>Akut:</strong> NSAID dosis tinggi: Diklofenak 3×50 mg/hari ATAU Indometasin 3×50 mg/hari 5-7 hari</li><li><strong>Jika kontraindikasi NSAID:</strong> Kolkisin 0.5 mg 2-3×/hari oral (hari pertama) ATAU Kortikosteroid (Metilprednisolon 4×8mg/hari tapering)</li><li><strong>Kompres dingin + elevasi sendi</strong></li><li><strong>Kontrol jangka panjang:</strong> Allopurinol 100-300 mg/hari (mulai setelah inflamasi reda 2-4 minggu) — target asam urat &lt;6 mg/dL</li><li><strong>Diet:</strong> Hindari jeroan, alkohol, seafood, daging merah. Minum banyak air 2-3 L/hari</li></ul></div>'}
]},
{id:3,name:"Rheumatoid Artritis",pages:[
{title:"Skenario",step:"IPM-1",content:'<div class="section"><h3>🏥 Skenario</h3><p>Seorang perempuan, 40 tahun, datang dengan keluhan nyeri dan bengkak pada sendi kedua tangan (PIP, MCP) dan pergelangan tangan secara simetris sejak 6 bulan. Kaku sendi pagi hari &gt;60 menit. Sendi juga terasa nyeri dan kaku setelah bangun tidur yang membaik setelah digerakkan. Pasien sulit mengepal tangan. Riwayat keluarga: ibu dengan RA.</p></div>'},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:'<div class="section"><h3>🔍 Gejala & Pemeriksaan</h3><ul><li><strong>Poliartritis simetris:</strong> MCP, PIP, pergelangan tangan, lutut, MTP — <strong>BUKAN DIP</strong> (berbeda dengan OA!)</li><li><strong>Morning stiffness &gt;30 menit</strong> — panjangnya kaku mencerminkan aktivitas inflamasi</li><li>Nodul reumatoid (benjolan subkutan di permukaan ekstensor siku)</li><li>Deformitas: Boutonniere, Swan-neck, ulnar drift (jari miring ke lateral)</li><li>Gejala ekstra-artikular: Kelelahan, demam ringan, Sjogren (mata kering), vaskulitis, fibrosis paru</li></ul><div class="media-box" style="background:#fef9e7;border-color:#e67e22"><h4 style="color:#e67e22">Diagnosis: Rheumatoid Arthritis — Seropositif (RF +, Anti-CCP +)</h4><p>ICD-10: M05.9 • Poliartritis simetris • Morning stiffness &gt;60 menit</p></div><h3>💊 Tatalaksana</h3><ul><li><strong>DMARD (rujukan spesialis):</strong> Metotreksat 7.5-25 mg/minggu (lini pertama) + Asam folat 1 mg/hari</li><li><strong>NSAID:</strong> Ibuprofen/Naproksen — kontrol simptom akut</li><li><strong>Kortikosteroid:</strong> Prednison 5-10 mg/hari (jembatan sementara sampai DMARD efektif)</li><li>Fisioterapi, okupasi terapi, latihan ROM</li><li>Edukasi: RA adalah penyakit autoimun kronik — tidak menular. Butuh kepatuhan DMARD jangka panjang. Monitor efek samping (hematologi, hepar, paru)</li></ul></div>'}
]},
{id:4,name:"Fraktur Tertutup Radius Distal",pages:[
{title:"Skenario",step:"IPM-1",content:'<div class="section"><h3>🏥 Skenario</h3><p>Seorang perempuan, 65 tahun, datang ke IGD setelah jatuh di kamar mandi dengan posisi tangan terbuka (refleks menjatuhkan diri). Pergelangan tangan kanan terlihat bengkak, deformitas seperti "dinner fork" (ga-
runcing garpu), dan nyeri hebat. Pasien tidak bisa menggerakkan pergelangan tangan. Tidak ada luka terbuka. Jari-jari teraba hangat, CRT normal, tetapi ada baal di jari 1-3 (median nerve?!!!).</p></div>'},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:'<div class="section"><h3>🔍 Gejala & Pemeriksaan</h3><ul><li><strong>Deformitas "dinner fork" (Colles fracture):</strong> Fraktur radius distal (2-3 cm proksimal sendi) dengan angulasi dorsal + pergeseran</li><li>Edema + ekimosis di pergelangan tangan</li><li>Nyeri tekan fokal, krepitasi, ROM terbatas</li><li><strong>Periksa neurovaskular!</strong> Median nerve: Sensorik jari 1-3, motorik OTB (opponens pollicis). Jika terganggu → kompartemen sindrom!</li></ul><div class="media-box" style="background:#fef9e7;border-color:#e67e22"><h4 style="color:#e67e22">Diagnosis: Fraktur Tertutup Radius Distal (Colles) Dekstra</h4><p>ICD-10: S52.5 • Deformitas dinner fork • Usia 65 th</p></div><h3>💊 Tatalaksana</h3><ul><li><strong>Reduksi tertutup + gips (above-elbow):</strong> Traksi, reposisi dorsifleksi → posisi netral/fleksi ringan</li><li><strong>Analgesik:</strong> Ketorolak 30 mg IM (loading) lalu Parasetamol + NSAID oral</li><li><strong>Pasang gips:</strong> Above-elbow (supinasi, fleksi siku 90°, ekstensi pergelangan 20°) selama 4-6 minggu</li><li>Elevasi ekstremitas — kurangi edema</li><li>Indikasi rujuk: Fraktur intra-artikular, comminuted, gagal reduksi, neurovaskular terganggu</li></ul></div>'}
]},
{id:5,name:"Fraktur Femur",pages:[
{title:"Skenario",step:"IPM-1",content:'<div class="section"><h3>🏥 Skenario</h3><p>Seorang laki-laki, 75 tahun, jatuh di kamar mandi. Panggul kanan nyeri hebat, tungkai kanan lebih pendek & rotasi eksternal (menghadap ke luar). Pasien tidak bisa mengangkat tungkai. Riwayat: osteoporosis, sering pusing karena obat hipertensi. Tidak ada luka terbuka. TTV stabil.</p></div>'},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:'<div class="section"><h3>🔍 Gejala & Pemeriksaan</h3><ul><li><strong>Fraktur kolum femoris (intrakapsuler):</strong> Nyeri panggul, tungkai rotasi eksternal, sedikit pemendekan</li><li><strong>Fraktur intertrokanter (ekstrakapsuler):</strong> Nyeri panggul, tungkai rotasi eksternal + pemendekan lebih jelas, edema luas</li><li>Pasien tidak bisa mengangkat tungkai lurus (straight leg raise negative)</li><li>ECG & lab pre-op (lansia → risiko komplikasi)</li></ul><div class="media-box" style="background:#fef9e7;border-color:#e67e22"><h4 style="color:#e67e22">Diagnosis: Fraktur Kolum Femoris Dekstra (Intrakapsuler)</h4><p>ICD-10: S72.0 • Tungkai rotasi eksternal • Pemendekan • Usia 75 th</p></div><h3>💊 Tatalaksana</h3><ul><li><strong>RUJUK ke RS (ortopedi):</strong> Untuk operasi — hemiartroplasti/total hip replacement</li><li><strong>Di IGD FKTP:</strong> Pasang splint (Thomas splint), analgetik (Ketorolak/ Morfin), pasang IVFD, puasa</li><li><strong>Jangan direposisi!</strong> — tunggu evaluasi radiologi di RS</li><li>Konseling: Risiko operasi pada lansia, tromboemboli, infeksi, dekubitus</li><li>Komplikasi: AVN (avaskular nekrosis) pada fraktur intrakapsuler</li></ul></div>'}
]},
{id:6,name:"Dislokasi Bahu",pages:[
{title:"Skenario",step:"IPM-1",content:'<div class="section"><h3>🏥 Skenario</h3><p>Seorang pemain basket, 22 tahun, datang ke IGD setelah jatuh dengan lengan terabduksi dan terputar ke luar saat merebut bola. Bahu kiri terlihat tidak bulat (shoulder contour hilang), ada tonjolan di depan sendi bahu, dan pasien tidak bisa menggerakkan lengan. Nyeri hebat. Tangan kiri terasa baal di daerah deltoid (aksilaris nerve?).</p></div>'},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:'<div class="section"><h3>🔍 Gejala & Pemeriksaan</h3><ul><li><strong>Dislokasi anterior (95%):</strong> Bahu tidak bulat (square shoulder), kaput humeri teraba di anterior, lengan abduksi-rotasi eksternal</li><li><strong>Dislokasi posterior (&lt;5%):</strong> Akibat kejang/tersengat listrik, lengan adduksi-rotasi internal</li><li>Periksa n. aksilaris: Sensorik regio deltoid — jika baal → neuropraksia</li><li>Periksa n. radialis, medianus, ulnaris — pastikan intak</li></ul><div class="media-box" style="background:#fef9e7;border-color:#e67e22"><h4 style="color:#e67e22">Diagnosis: Dislokasi Anterior Bahu Sinistra</h4><p>ICD-10: S43.0 • Square shoulder • Trauma abduksi-rotasi</p></div><h3>💊 Tatalaksana</h3><ul><li><strong>Reduksi tertutup (sebelum foto rontgen jika diagnosis jelas):</strong> Stimson (tengkurap, gantung lengan) atau Kocher/Hippocrates (hati-hati rotasi) atau Milch (abduksi + tekanan kaput)</li><li><strong>Setelah sukses:</strong> Sling & swathe (immobilisasi) 3-4 minggu</li><li>Kontrol rontgen post-reduksi: Pastikan posisi baik, cek Hill-Sachs/Bankart lesion</li><li>Rujuk ortopedi jika: gagal reduksi, dislokasi rekuren, fraktur asosiasi, cedera neurovaskular</li></ul></div>'}
]},
{id:7,name:"Keseleo Ankle (Sprain Ankle)",pages:[
{title:"Skenario",step:"IPM-1",content:'<div class="section"><h3>🏥 Skenario</h3><p>Seorang mahasiswi, 20 tahun, datang dengan pergelangan kaki kiri bengkak dan nyeri setelah salah mendarat saat bermain voli (kaki terbalik ke dalam/inversi). Tidak bisa menapak sama sekali. Riwayat: pernah sprain ankle kiri 2 kali sebelumnya. Tidak ada deformitas, krepitasi, atau luka terbuka.</p></div>'},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:'<div class="section"><h3>🔍 Gejala & Pemeriksaan</h3><ul><li><strong>Inversion sprain (90%):</strong> Laserasi ligamen talofibular anterior + kalkaneofibular</li><li>Edema + ekimosis + nyeri tekan di lateral malleolus</li><li><strong>Grading:</strong> Grade 1 (regang), Grade 2 (robak parsial), Grade 3 (ruptur total)</li><li>Periksa tanda: Anterior drawer test (stabilitas talar), Talar tilt test (stabilitas lateral) — jangan lakukan jika nyeri akut</li><li>Pastikan tidak ada fraktur: Palpasi maleolus medial, lateral, basis metatarsal 5, dan navikular (Ottawa Ankle Rules)</li></ul><div class="media-box" style="background:#fef9e7;border-color:#e67e22"><h4 style="color:#e67e22">Diagnosis: Sprain Ankle Sinistra Grade 2 (Ligamen Talofibular Anterior)</h4><p>ICD-10: S93.4 • Inversion trauma • Ottawa Rules negatif</p></div><h3>💊 Tatalaksana — PRICE</h3><ul><li><strong>P - Protection:</strong> Brace/ankle support</li><li><strong>R - Rest:</strong> Istirahat 1-3 hari</li><li><strong>I - Ice:</strong> Kompres dingin 20 menit tiap 2-3 jam</li><li><strong>C - Compression:</strong> Perban elastis</li><li><strong>E - Elevation:</strong> Tinggikan di atas jantung</li><li>Analgesik: Ibuprofen 400 mg 3×/hari 3-5 hari</li><li>Rehabilitasi: Latihan ROM, peregangan, penguatan (BAPS board) setelah nyeri reda</li></ul></div>'}
]},
{id:8,name:"Osteoporosis",pages:[
{title:"Skenario",step:"IPM-1",content:'<div class="section"><h3>🏥 Skenario</h3><p>Seorang perempuan, 62 tahun, postmenopause 15 tahun, datang kontrol rutin. Pasien mengkhawatirkan risiko pengeroposan tulang karena ibunya mengalami fraktur panggul di usia 70 tahun. Pasien tidak pernah olahraga, diet rendah kalsium, dan pernah merokok 20 tahun lalu. Tinggi badan sekarang 152 cm (sebelumnya 158 cm — turun 6 cm!). Tidak ada nyeri akut.</p></div>'},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:'<div class="section"><h3>🔍 Gejala & Diagnosis</h3><ul><li><strong>"Silent disease"</strong> — tidak ada gejala sampai terjadi fraktur</li><li>Tinggi badan menurun &gt;4 cm dari tinggi maksimal — kompresi vertebra torakalis</li><li>Kifosis torakal (dowager\'s hump) — akibat fraktur kompresi multipel</li><li>Nyeri punggung kronik — akibat fraktur vertebra mikro</li><li>Risiko: Usia, menopause, riwayat fraktur keluarga, BMI &lt;18, merokok, steroid jangka panjang</li><li>Pemeriksaan: Bone Mineral Density (BMD) DXA — T-score ≤ -2.5 = osteoporosis</li></ul><div class="media-box" style="background:#fef9e7;border-color:#e67e22"><h4 style="color:#e67e22">Diagnosis: Osteoporosis Postmenopause (T-score -2.8)</h4><p>ICD-10: M81.0 • Tinggi turun 6 cm • FRAX high risk</p></div><h3>💊 Tatalaksana</h3><ul><li><strong>Suplementasi:</strong> Kalsium 1000-1200 mg/hari + Vitamin D 800-1000 IU/hari</li><li><strong>Medikamentosa:</strong> Bisfosfonat (Alendronat 70 mg/minggu) — minum dengan air putih & tegak 30 menit</li><li><strong>Alternatif:</strong> Denosumab 60 mg SC/6 bulan atau Raloksifen 60 mg/hari (hanya untuk wanita)</li><li>Latihan weight-bearing (jalan, senam) + latihan keseimbangan (cegah jatuh)</li><li>Edukasi: Cegah jatuh — modifikasi rumah (handrail, alas anti-selip), gunakan alas kaki anti-selip</li></ul></div>'}
]},
{id:9,name:"Carpal Tunnel Syndrome",pages:[
{title:"Skenario",step:"IPM-1",content:'<div class="section"><h3>🏥 Skenario</h3><p>Seorang perempuan, 45 tahun, datang dengan keluhan kesemutan dan baal di jari 1-3 (ibu jari, telunjuk, jari tengah) tangan kanan sejak 3 bulan — terutama malam hari (membangunkan tidur). Pasien juga merasa tangannya kaku dan lemah saat memegang gelas. Riwayat: sering mengetik & menggunakan mouse &gt;8 jam/hari, dan memiliki DM tipe 2.</p></div>'},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:'<div class="section"><h3>🔍 Gejala & Pemeriksaan</h3><ul><li><strong>Parestesi di area n. medianus:</strong> Jari 1, 2, 3, dan setengah jari 4 (radial side). Jari kelingking TIDAK terkena!</li><li>Gejala memberat malam hari — "flick sign": pasien menggoyangkan tangan untuk meredakan gejala</li><li><strong>Test provokasi:</strong> Phalen test (fleksi pergelangan 60° 1 menit → timbul gejala) (+), Tinel sign (ketuk n. medianus → parestesi) (+)</li><li>Atrofi thenar (m. abduktor pollicis brevis) — pada lanjut</li></ul><div class="media-box" style="background:#fef9e7;border-color:#e67e22"><h4 style="color:#e67e22">Diagnosis: Carpal Tunnel Syndrome Dekstra — Sedang</h4><p>ICD-10: G56.0 • Phalen (+) • Tinel (+) • Hipestesi jari 1-3</p></div><h3>💊 Tatalaksana</h3><ul><li><strong>Konservatif (lini pertama):</strong> Splint pergelangan tangan netral malam hari + NSAID oral + modifikasi aktivitas (ergonomis)</li><li><strong>Injeksi kortikosteroid ke terowongan karpal</strong> (rujuk spesialis)</li><li>Kontrol DM — neuropati diabetik memperburuk</li><li>Rujuk bedah saraf/ortopedi: Jika atrofi thenar, kelemahan motorik, gagal terapi konservatif 2-3 bulan → operasi dekompresi (open/endoscopic)</li></ul></div>'}
]},
{id:10,name:"Tendinitis / Tendinopati",pages:[
{title:"Skenario",step:"IPM-1",content:'<div class="section"><h3>🏥 Skenario</h3><p>Seorang pria, 35 tahun, sering berolahraga badminton (3-4×/minggu), datang dengan nyeri bahu kanan saat mengangkat lengan ke atas (abduksi &gt;60°). Nyeri menusuk di daerah deltoid dan sulit tidur miring ke kanan. Riwayat: servis badminton berulang. Tidak ada demam, tidak merah. Pasien sudah minum ibuprofen tapi hanya reda sementara.</p></div>'},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:'<div class="section"><h3>🔍 Gejala & Pemeriksaan</h3><ul><li><strong>Tendinitis supraspinatus (rotator cuff):</strong> Nyeri di deltoid/lengan atas, terutama abduksi 60-120° (painful arc syndrome)</li><li>Weakness: Kelemahan abduksi lengan (jika ruptur rotator cuff → drop arm sign (+))</li><li><strong>Test khusus:</strong> Neer impingement (+), Hawkins-Kennedy (+), Jobe test (+)</li><li>Pada tendonitis lain: Lateral epicondylitis (tennis elbow), De Quervain\'s tenosynovitis (nyeri pergelangan sisi radial)</li></ul><div class="media-box" style="background:#fef9e7;border-color:#e67e22"><h4 style="color:#e67e22">Diagnosis: Tendinitis Supraspinatus — Rotator Cuff Impingement</h4><p>ICD-10: M75.1 • Painful arc • Nyeri abduksi 60-120° • Overuse</p></div><h3>💊 Tatalaksana</h3><ul><li><strong>Istirahat relatif:</strong> Hindari gerakan overhead</li><li><strong>NSAID:</strong> Diklofenak 50 mg 3×/hari ATAU Meloksikam 7.5 mg/hari 7-14 hari</li><li><strong>Fisioterapi:</strong> Peregangan, penguatan rotator cuff, ESWT (extracorporeal shockwave)</li><li>Injeksi kortikosteroid: Jika nyeri berat (rujuk spesialis)</li><li>Rujuk ortopedi: Jika ruptur rotator cuff total, refrakter 6 bulan</li></ul></div>'}
]},
{id:11,name:"Bursitis",pages:[
{title:"Skenario",step:"IPM-1",content:'<div class="section"><h3>🏥 Skenario</h3><p>Seorang laki-laki, 50 tahun, pekerja bangunan, datang dengan benjolan di siku kanan (di belakang siku/olecranon) yang membesar perlahan dan nyeri saat siku ditekuk. Daerah belakang siku merah, hangat, dan nyeri tekan. Pasien sering bertumpu pada siku saat mengecat lantai. Tidak demam, tapi area terasa hangat. Tidak ada luka tusuk.</p></div>'},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:'<div class="section"><h3>🔍 Gejala & Pemeriksaan</h3><ul><li>Pembengkakan fokal di atas bursa — fluktuatif, nyeri tekan (+)</li><li>Bursitis olekrani: Di belakang siku (akibat tekanan berulang)</li><li>Bursitis prepatellar: Di depan lutut (akibat berlutut — "housemaid\'s knee")</li><li>Bursitis trokanterika: Di samping pinggul (nyeri saat tidur miring)</li><li>Jika infeksi: Demam, eritema luas, selulitis → aspirasi untuk kultur</li></ul><div class="media-box" style="background:#fef9e7;border-color:#e67e22"><h4 style="color:#e67e22">Diagnosis: Bursitis Olecrani Dekstra (Non-Septik)</h4><p>ICD-10: M70.2 • Pembengkakan bursa olekrani • Nyeri tekan • Pekerjaan menekan siku</p></div><h3>💊 Tatalaksana</h3><ul><li><strong>Konservatif:</strong> Hindari tekanan + Kompres dingin + NSAID oral (Ibuprofen 400 mg 3×/hari)</li><li><strong>Jika non-septik & besar:</strong> Aspirasi + injeksi kortikosteroid (rujuk spesialis)</li><li><strong>Jika septik (demam + eritema luas):</strong> Antibiotik (Sefaleksin 4×500 mg/hari 7-10 hari) + aspirasi drainase</li><li>Edukasi: Gunakan bantalan siku saat bekerja/berlutut</li></ul></div>'}
]},
{id:12,name:"Osteomielitis",pages:[
{title:"Skenario",step:"IPM-1",content:'<div class="section"><h3>🏥 Skenario</h3><p>Seorang anak laki-laki, 8 tahun, dibawa ibunya dengan demam tinggi 39.5°C sejak 3 hari dan nyeri hebat di paha kanan (femur). Anak tidak bisa berjalan dan menangis jika pahanya disentuh. Paha terlihat bengkak, merah, dan hangat. Riwayat: furunkel di kulit 2 minggu lalu. Riwayat trauma (-). Pasien dibawa ke Puskesmas karena demam tidak turun dengan parasetamol.</p></div>'},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:'<div class="section"><h3>🔍 Gejala & Pemeriksaan</h3><ul><li><strong>Trias OMI akut:</strong> Demam tinggi + Nyeri tulang hebat (deep boring pain) + Edema/hangat lokal</li><li>Pseudoparalisis — anak tidak mau menggerakkan tungkai (palsi semu)</li><li>Nyeri tekan fokal pada metafisis tulang panjang (femur, tibia, humerus)</li><li>Penyebab: Staph aureus (paling sering) → hematogen dari infeksi lain</li><li>Komplikasi: Septik artritis, abses subperiosteal, kronik → sequestrum + involucrum</li></ul><div class="media-box" style="background:#fef9e7;border-color:#e67e22"><h4 style="color:#e67e22">Diagnosis: Osteomielitis Akut Femur Dekstra — Hematogen</h4><p>ICD-10: M86.0 • Demam + nyeri metafisis + furunkel sebelumnya</p></div><h3>💊 Tatalaksana</h3><ul><li><strong>RUJUK SEGERA ke RS!</strong> — Butuh antibiotik IV + kemungkinan operasi</li><li><strong>Antibiotik empiris (di RS):</strong> Kloksasilin/Flukloksasilin 50-100 mg/kg/hari IV 6 jam ATAU Sefazolin IV (anti-Staph)</li><li><strong>Di FKTP:</strong> Ambil kultur darah, beri analgesik, kompres dingin, rujuk</li><li>Jangan beri antibiotik oral dulu — bisa mengaburkan hasil kultur</li><li>Operasi: Debridemen + drainase jika ada abses atau tidak membaik 48 jam</li></ul></div>'}
]},
{id:13,name:"Artritis Septik",pages:[
{title:"Skenario",step:"IPM-1",content:'<div class="section"><h3>🏥 Skenario</h3><p>Seorang laki-laki, 55 tahun, dengan DM tipe 2 tidak terkontrol, datang dengan nyeri hebat di lutut kiri onset 1 hari yang lalu. Lutut bengkak, merah, hangat, dan sangat nyeri (sampai tidak bisa digerakkan sama sekali). Demam 39°C, menggigil, lesu. Pasien juga memiliki ulkus diabetik di kaki. Riwayat tidak ada trauma.</p></div>'},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:'<div class="section"><h3>🔍 Gejala & Pemeriksaan</h3><ul><li><strong>Monoartritis akut — sangat nyeri!</strong> "The red, hot, painful, swollen joint"</li><li>Demam tinggi + menggigil + tanda sepsis</li><li>Pseudo-paralisis: Pasien tidak bisa menggerakkan sendi karena nyeri</li><li>Penyebab: Staph aureus, Strep, Neisseria gonorrhea (pada dewasa muda)</li><li>Port d\'entrée: Infeksi kulit, ISK, kateter IV (pada anak juga bisa hematogen)</li></ul><div class="media-box" style="background:#fef9e7;border-color:#e67e22"><h4 style="color:#e67e22">Diagnosis: Artritis Septik Lutut Kiri — Susp. Staph aureus</h4><p>ICD-10: M00.9 • Monoartritis + demam • DM (+)</p></div><h3>💊 Tatalaksana</h3><ul><li><strong>DARURAT! RUJUK ke RS segera!</strong></li><li>Artrosentesis (aspirasi sendi): Cairan pus/kuning keruh → Gram + kultur + kristal (bedakan dengan gout!)</li><li>Butir-butir: Jumlah leukosit &gt;50.000, PMN dominan, Gram (+)</li><li><strong>Antibiotik IV empiris:</strong> Sefaleksin/Kloksasilin ATAU Sefalosporin generasi III</li><li>Di FKTP: Stabilisasi, analgesik, pasang IV, rujuk!</li><li>Komplikasi: Kerusakan kartilago ireversibel 24-48 jam — EMERGENCY!</li></ul></div>'}
]},
{id:14,name:"Fraktur Klavikula",pages:[
{title:"Skenario",step:"IPM-1",content:'<div class="section"><h3>🏥 Skenario</h3><p>Seorang bayi, 2 hari, lahir spontan dengan Presentasi kepala namun ada distosia bahu. Bayi tampak tidak mau menggerakkan lengan kanan (pseudoparalisis). Klavikula kanan bengkak, krepitasi (+). Bayi menangis saat lengan kanan digerakkan. Ekstremitas atas kiri normal. Riwayat: ibu G1P0A0, BB lahir 4200 gram.</p></div>'},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:'<div class="section"><h3>🔍 Gejala & Pemeriksaan</h3><ul><li>Edema + krepitasi pada klavikula (biasanya sepertiga tengah)</li><li>Bayi tidak mau menggerakkan lengan (pseudoparalisis) — bedakan dengan Erb\'s palsy</li><li>Nyeri saat palpasi atau gerakan pasif</li><li>Pada fraktur klavikula dewasa: Jatuh dengan lengan terentang atau trauma langsung</li><li>Klavikula adalah tulang yang paling sering fraktur saat lahir!</li></ul><div class="media-box" style="background:#fef9e7;border-color:#e67e22"><h4 style="color:#e67e22">Diagnosis: Fraktur Klavikula Dekstra — Fraktur Lahir</h4><p>ICD-10: P13.4 • Distosia bahu • Berat lahir 4200g • Krepitasi (+)</p></div><h3>💊 Tatalaksana</h3><ul><li><strong>Pada neonatus:</strong> Immobilisasi dengan kassa — lengan ditempel di dada selama 7-10 hari. Prognosis sangat baik, remodeling cepat</li><li><strong>Pada dewasa:</strong> Sling/simple sling 4-6 minggu. Figure-of-8 brace alternative</li><li>Analgesik sesuai usia</li><li><strong>Rujuk ortopedi jika:</strong> Fraktur terbuka, neurovaskular terganggu, fraktur sepertiga distal (risiko nonunion), fraktur displaced berat</li><li>Edukasi: Remodeling tulang sangat baik pada anak — biasanya sembuh sempurna</li></ul></div>'}
]}
];

// ENGINE
let currentDisease=0,currentPage=0,isFlipping=false;
function init(){const l=document.getElementById('diseaseList');DISEASES.forEach((d,i)=>{const li=document.createElement('li');li.innerHTML='<span class="num">'+(i+1)+'</span><span class="name">'+d.name+'</span>';li.onclick=()=>goToDisease(i);li.id='disease-'+i;l.appendChild(li);});loadDisease(0);}
function goToDisease(i){if(isFlipping)return;currentDisease=i;currentPage=0;loadDisease(i);document.querySelectorAll('.disease-list li').forEach(l=>l.classList.remove('active'));document.getElementById('disease-'+i).classList.add('active');}
function loadDisease(i){const d=DISEASES[i];const b=document.getElementById('flipbook');b.innerHTML='';d.pages.forEach((p,j)=>{const dv=document.createElement('div');dv.className='page'+(j===0?' active':'');dv.id='page-'+i+'-'+j;dv.innerHTML='<div class="page-header"><span class="step">'+p.step+'</span><span class="ptitle">'+p.title+'</span></div>'+p.content;b.appendChild(dv);});updateUI();}
function updateUI(){const d=DISEASES[currentDisease];document.getElementById('flipTitle').textContent=d.name;document.getElementById('flipBadge').textContent=(currentDisease+1)+'/'+DISEASES.length;document.getElementById('pageNum').textContent=currentPage+1;document.getElementById('pageTotal').textContent=d.pages.length;document.getElementById('prevBtn').disabled=currentPage===0;document.getElementById('nextBtn').disabled=currentPage===d.pages.length-1;document.querySelectorAll('.page').forEach((e,i)=>e.classList.toggle('active',i===currentPage));}
function nextPage(){if(isFlipping||currentPage>=DISEASES[currentDisease].pages.length-1)return;isFlipping=true;const o=document.getElementById('page-'+currentDisease+'-'+currentPage);o.classList.add('flip-out');setTimeout(()=>{o.classList.remove('active','flip-out');currentPage++;document.getElementById('page-'+currentDisease+'-'+currentPage).classList.add('flip-in');updateUI();setTimeout(()=>{document.getElementById('page-'+currentDisease+'-'+currentPage).classList.remove('flip-in');isFlipping=false;},400);},300);}
function prevPage(){if(isFlipping||currentPage<=0)return;isFlipping=true;const o=document.getElementById('page-'+currentDisease+'-'+currentPage);o.style.animation='flipOut .5s ease reverse';setTimeout(()=>{o.classList.remove('active');o.style.animation='';currentPage--;document.getElementById('page-'+currentDisease+'-'+currentPage).classList.add('active');updateUI();setTimeout(()=>{isFlipping=false;},300);},300);}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown')nextPage();if(e.key==='ArrowLeft'||e.key==='ArrowUp')prevPage();});
document.addEventListener('DOMContentLoaded',init);
</script>
</body></html>
