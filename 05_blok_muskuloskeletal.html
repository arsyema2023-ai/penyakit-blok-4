<!DOCTYPE html>
<html lang="id">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>OSCE Flipbook — Blok Muskuloskeletal | SKDI 4A</title>
<style>:root{--primary:#e67e22;--primary-dark:#d35400;--accent:#f39c12;--bg:#f5f6fa;--card:#fff;--text:#2c3e50;--text-light:#95a5a6;--radius:16px;--font:'Segoe UI',system-ui,sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:260px;min-width:260px;background:var(--primary);color:#fff;overflow-y:auto;padding:16px 0}
.sidebar h1{font-size:1rem;padding:0 16px 12px;border-bottom:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;gap:8px}
.sidebar .subtitle{padding:6px 16px 10px;font-size:0.7rem;color:rgba(255,255,255,0.5)}
.disease-list{list-style:none;padding:4px 0}
.disease-list li{padding:8px 16px 8px 20px;cursor:pointer;font-size:0.82rem;border-left:3px solid transparent;transition:all .3s;display:flex;align-items:center;gap:8px}
.disease-list li:hover{background:rgba(255,255,255,0.06)}.disease-list li.active{background:rgba(255,255,255,0.1);border-left-color:var(--accent);font-weight:600}
.disease-list li .num{font-size:0.65rem;color:rgba(255,255,255,0.4);min-width:20px;font-weight:700}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--card);padding:10px 20px;box-shadow:0 2px 8px rgba(0,0,0,0.06);display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--accent)}
.topbar h2{font-size:1rem;color:var(--accent)}.topbar .badge{background:var(--accent);color:#fff;padding:2px 10px;border-radius:20px;font-size:0.7rem}
.topbar .page-info{font-size:0.82rem;color:var(--text-light)}
.flipbook-wrapper{flex:1;display:flex;align-items:center;justify-content:center;padding:16px;overflow:hidden}
.flipbook{width:100%;max-width:960px;height:100%;max-height:84vh;position:relative;perspective:1600px}
.page{position:absolute;inset:0;background:var(--card);border-radius:var(--radius);box-shadow:0 8px 32px rgba(0,0,0,0.1);padding:28px 32px;overflow-y:auto;display:none}
.page.active{display:block;z-index:10}.page.flip-out{animation:flipOut .5s ease forwards}.page.flip-in{animation:flipIn .5s ease forwards}
@keyframes flipOut{0%{transform:rotateY(0);opacity:1}100%{transform:rotateY(-90deg);opacity:0}}
@keyframes flipIn{0%{transform:rotateY(90deg);opacity:0}100%{transform:rotateY(0);opacity:1}}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--accent)}
.page-header .step{font-size:0.7rem;color:#fff;background:var(--accent);padding:2px 10px;border-radius:12px;font-weight:600}
.page-header .ptitle{font-size:1.1rem;font-weight:700;color:var(--primary)}
.section{margin-bottom:12px}.section h3{font-size:0.9rem;color:var(--accent);margin-bottom:6px}
.section p,.section li{font-size:0.85rem;line-height:1.65;color:var(--text)}.section ul{padding-left:18px}.section ul li{margin-bottom:3px}
.media-box{background:#f8f9fa;border-radius:10px;padding:12px;margin:10px 0;border:1px solid #e9ecef;text-align:center;font-size:0.82rem}
.media-box table{width:100%;border-collapse:collapse;font-size:0.82rem}.media-box th{background:var(--primary);color:#fff;padding:6px;text-align:left}.media-box td{padding:6px;border-bottom:1px solid #eee}
.media-box .caption{font-size:0.72rem;color:var(--text-light);margin-top:6px;font-style:italic}
.nav-buttons{display:flex;justify-content:space-between;align-items:center;padding:10px 20px;background:var(--card);border-top:1px solid #eee}
.nav-buttons button{padding:8px 20px;border:none;border-radius:8px;font-size:0.82rem;font-weight:600;cursor:pointer;transition:all .3s;display:flex;align-items:center;gap:6px}
.btn-prev{background:#ecf0f1;color:var(--text)}.btn-prev:hover{background:#dfe4e6}.btn-next{background:var(--accent);color:#fff}.btn-next:hover{background:var(--primary-dark)}.btn-next:disabled,.btn-prev:disabled{opacity:.4;cursor:not-allowed}
.btn-reset{background:transparent;color:var(--text-light);border:1px solid #ddd!important}
.prescription-box{background:#fffef5;border:2px solid #e8dcc8;border-radius:10px;padding:16px;font-family:'Courier New',monospace;margin:10px 0;font-size:0.82rem}
.prescription-box .rx{font-size:1.1rem;font-weight:700;color:var(--primary)}
.prescription-box .rx-item{padding:4px 0;border-bottom:1px dotted #eee;display:flex;gap:10px}
.prescription-box .rx-item .r{min-width:25px;color:var(--accent);font-weight:700}
@media(max-width:768px){.sidebar{width:50px;min-width:50px}.sidebar h1 span,.sidebar .subtitle,.disease-list li .name{display:none}.disease-list li{padding:12px;justify-content:center}.page{padding:16px}}
.page::-webkit-scrollbar{width:5px}.page::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
</style>
</head>
<body><div class="app">
<nav class="sidebar"><h1>🦴 <span>Blok Muskuloskeletal</span></h1><div class="subtitle">15 Flipbook • SKDI 4A • OSCE</div><ul class="disease-list" id="diseaseList"></ul></nav>
<div class="main">
<div class="topbar"><div style="display:flex;align-items:center;gap:10px"><h2 id="flipTitle">Osteoartritis</h2><span class="badge" id="flipBadge">1/15</span></div><div class="page-info">Hlm <span id="pageNum">1</span>/<span id="pageTotal">12</span></div></div>
<div class="flipbook-wrapper"><div class="flipbook" id="flipbook"></div></div>
<div class="nav-buttons"><div><button class="btn-reset" onclick="goToDisease(currentDisease)">📖 Awal</button></div><div style="display:flex;gap:8px"><button class="btn-prev" id="prevBtn" onclick="prevPage()">◀ Sebelumnya</button><button class="btn-next" id="nextBtn" onclick="nextPage()">Selanjutnya ▶</button></div></div>
</div></div>
<script>
const DISEASES=[
{id:0,name:"Osteoartritis",pages:[
{title:"Skenario",step:"IPM-1",content:``},
{title:"Gejala & Pemeriksaan",step:"IPM-2-5",content:``},
{title:"Diagnosis & Tatalaksana",step:"IPM-6-12",content:``}
]},
{id:1,name:"Low Back Pain",pages:[
{title:"Skenario",step:"IPM-1",content:``},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:``}
]},
{id:2,name:"Gout Artritis",pages:[
{title:"Skenario",step:"IPM-1",content:``},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:``}
]},
{id:3,name:"Rheumatoid Artritis",pages:[
{title:"Skenario",step:"IPM-1",content:``},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:``}
]},
{id:4,name:"Fraktur Tertutup Radius Distal",pages:[
{title:"Skenario",step:"IPM-1",content:``},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:``}
]},
{id:5,name:"Fraktur Femur",pages:[
{title:"Skenario",step:"IPM-1",content:``},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:``}
]},
{id:6,name:"Dislokasi Bahu",pages:[
{title:"Skenario",step:"IPM-1",content:``},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:``}
]},
{id:7,name:"Keseleo Ankle (Sprain Ankle)",pages:[
{title:"Skenario",step:"IPM-1",content:``},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:``}
]},
{id:8,name:"Osteoporosis",pages:[
{title:"Skenario",step:"IPM-1",content:``},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:``}
]},
{id:9,name:"Carpal Tunnel Syndrome",pages:[
{title:"Skenario",step:"IPM-1",content:``},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:``}
]},
{id:10,name:"Tendinitis / Tendinopati",pages:[
{title:"Skenario",step:"IPM-1",content:``},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:``}
]},
{id:11,name:"Bursitis",pages:[
{title:"Skenario",step:"IPM-1",content:``},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:``}
]},
{id:12,name:"Osteomielitis",pages:[
{title:"Skenario",step:"IPM-1",content:``},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:``}
]},
{id:13,name:"Artritis Septik",pages:[
{title:"Skenario",step:"IPM-1",content:``},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:``}
]},
{id:14,name:"Fraktur Klavikula",pages:[
{title:"Skenario",step:"IPM-1",content:``},
{title:"Gejala & Tatalaksana",step:"IPM-2-12",content:``}
]}
];

// ENGINE
let currentDisease=0,currentPage=0,isFlipping=false;
function init(){const l=document.getElementById('diseaseList');DISEASES.forEach((d,i)=>{const li=document.createElement('li');li.innerHTML='<span class="num">'+(i+1)+'</span><span class="name">'+d.name+'</span>';li.onclick=()=>goToDisease(i);li.id='disease-'+i;l.appendChild(li);});loadDisease(0);}
function goToDisease(i){if(isFlipping)return;currentDisease=i;currentPage=0;loadDisease(i);document.querySelectorAll('.disease-list li').forEach(l=>l.classList.remove('active'));document.getElementById('disease-'+i).classList.add('active');}
function loadDisease(i){const d=DISEASES[i];const b=document.getElementById('flipbook');b.innerHTML='';d.pages.forEach((p,j)=>{const dv=document.createElement('div');dv.className='page'+(j===0?' active':'');dv.id='page-'+i+'-'+j;dv.innerHTML='<div class="page-header"><span class="step">'+p.step+'</span><span class="ptitle">'+p.title+'</span></div>'+p.content;b.appendChild(dv);});updateUI();}
function updateUI(){const d=DISEASES[currentDisease];document.getElementById('flipTitle').textContent=d.name;document.getElementById('flipBadge').textContent=(currentDisease+1)+'/'+DISEASES.length;document.getElementById('pageNum').textContent=currentPage+1;document.getElementById('pageTotal').textContent=d.pages.length;document.getElementById('prevBtn').disabled=currentPage===0;document.getElementById('nextBtn').disabled=currentPage===d.pages.length-1;document.querySelectorAll('.page').forEach((e,i)=>e.classList.toggle('active',i===currentPage));}
function nextPage(){if(isFlipping||currentPage>=DISEASES[currentDisease].pages.length-1)return;isFlipping=true;const o=document.getElementById('page-'+currentDisease+'-'+currentPage);o.classList.add('flip-out');setTimeout(()=>{o.classList.remove('active','flip-out');currentPage++;document.getElementById('page-'+currentDisease+'-'+currentPage).classList.add('flip-in');updateUI();setTimeout(()=>{document.getElementById('page-'+currentDisease+'-'+currentPage).classList.remove('flip-in');isFlipping=false;},400);},300);}
function prevPage(){if(isFlipping||currentPage<=0)return;isFlipping=true;const o=document.getElementById('page-'+currentDisease+'-'+currentPage);o.style.animation='flipOut .5s ease reverse';setTimeout(()=>{o.classList.remove('active');o.style.animation='';currentPage--;document.getElementById('page-'+currentDisease+'-'+currentPage).classList.add('active');updateUI();setTimeout(()=>{isFlipping=false;},300);},300);}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='ArrowDown')nextPage();if(e.key==='ArrowLeft'||e.key==='ArrowUp')prevPage();});
document.addEventListener('DOMContentLoaded',init);
</script>
</body></html>
