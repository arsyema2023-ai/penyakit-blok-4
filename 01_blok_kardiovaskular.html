<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSCE Flipbook — Blok Kardiovaskular | SKDI 4A</title>
<style>
/* === ROOT & RESET === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #c0392b; --primary-dark: #96281b;
  --secondary: #2c3e50; --accent: #e74c3c;
  --bg: #f5f6fa; --card: #ffffff; --text: #2c3e50;
  --text-light: #7f8c8d; --shadow: 0 8px 32px rgba(0,0,0,0.12);
  --radius: 16px; --transition: 0.4s cubic-bezier(0.4,0,0.2,1);
  --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
}
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

/* === LAYOUT === */
.app { display: flex; height: 100vh; overflow: hidden; }

/* === SIDEBAR === */
.sidebar {
  width: 280px; min-width: 280px; background: var(--secondary);
  color: white; overflow-y: auto; padding: 20px 0; z-index: 100;
  display: flex; flex-direction: column;
}
.sidebar h1 { font-size: 1.1rem; padding: 0 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 10px; }
.sidebar h1 .icon { font-size: 1.4rem; }
.sidebar .subtitle { padding: 8px 20px 12px; font-size: 0.75rem; color: rgba(255,255,255,0.6); border-bottom: 1px solid rgba(255,255,255,0.05); }
.disease-list { list-style: none; padding: 8px 0; flex: 1; }
.disease-list li {
  padding: 10px 20px 10px 24px; cursor: pointer; font-size: 0.85rem;
  border-left: 3px solid transparent; transition: all var(--transition);
  display: flex; align-items: center; gap: 10px;
}
.disease-list li:hover { background: rgba(255,255,255,0.08); }
.disease-list li.active { background: rgba(255,255,255,0.12); border-left-color: var(--accent); font-weight: 600; }
.disease-list li .num { font-size: 0.7rem; color: rgba(255,255,255,0.4); min-width: 22px; font-weight: 700; }
.disease-list li .name { flex: 1; }

/* === MAIN CONTENT === */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* === TOP BAR === */
.topbar {
  background: var(--card); padding: 12px 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  display: flex; align-items: center; justify-content: space-between; z-index: 50;
  border-bottom: 2px solid var(--primary);
}
.topbar .title-section { display: flex; align-items: center; gap: 12px; }
.topbar .title-section h2 { font-size: 1.1rem; color: var(--primary); }
.topbar .title-section .badge { background: var(--primary); color: white; padding: 2px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
.topbar .page-indicator { font-size: 0.85rem; color: var(--text-light); }
.topbar .page-indicator span { font-weight: 700; color: var(--text); }

/* === FLIPBOOK CONTAINER === */
.flipbook-wrapper {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 20px; overflow: hidden; position: relative;
}
.flipbook {
  width: 100%; max-width: 1000px; height: 100%; max-height: 82vh;
  position: relative; perspective: 1600px;
}

/* === PAGES === */
.page {
  position: absolute; inset: 0; background: var(--card); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 32px 40px; overflow-y: auto;
  display: none; transform-origin: left center;
  transition: transform 0.6s ease, opacity 0.5s ease;
  -webkit-overflow-scrolling: touch;
}
.page.active { display: block; z-index: 10; }
.page.flipping { display: block; animation: flipOut 0.6s ease forwards; }
.page.flipping-in { display: block; animation: flipIn 0.6s ease forwards; }

@keyframes flipOut {
  0% { transform: rotateY(0deg) scale(1); opacity: 1; }
  100% { transform: rotateY(-90deg) scale(0.95); opacity: 0; }
}
@keyframes flipIn {
  0% { transform: rotateY(90deg) scale(0.95); opacity: 0; }
  100% { transform: rotateY(0deg) scale(1); opacity: 1; }
}

/* === PAGE CONTENT === */
.page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 3px solid var(--primary); }
.page-header .step { font-size: 0.75rem; color: white; background: var(--primary); padding: 3px 12px; border-radius: 20px; font-weight: 600; }
.page-header .page-title { font-size: 1.2rem; font-weight: 700; color: var(--secondary); }
.page-header .page-num { font-size: 0.8rem; color: var(--text-light); }

.section { margin-bottom: 16px; }
.section h3 { font-size: 0.95rem; color: var(--primary); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.section h3 .emoji { font-size: 1.1rem; }
.section p, .section li { font-size: 0.88rem; line-height: 1.7; color: var(--text); }
.section ul { padding-left: 20px; }
.section ul li { margin-bottom: 4px; }
.tag { display: inline-block; background: #fef0ef; color: var(--primary); padding: 2px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; margin: 2px; }

/* === MEDIA BOX === */
.media-box {
  background: #f8f9fa; border-radius: 12px; padding: 16px;
  margin: 12px 0; border: 1px solid #e9ecef; text-align: center;
}
.media-box canvas, .media-box svg { max-width: 100%; border-radius: 8px; }
.media-box .caption { font-size: 0.75rem; color: var(--text-light); margin-top: 8px; font-style: italic; }

/* === ECG Display === */
.ecg-container { background: #fff; border-radius: 8px; padding: 10px; border: 1px solid #ddd; margin: 8px 0; }
.ecg-container canvas { width: 100%; height: 120px; }

/* === BUTTONS === */
.nav-buttons {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 24px; background: var(--card); border-top: 1px solid #eee;
  gap: 12px;
}
.nav-buttons button {
  padding: 10px 24px; border: none; border-radius: 10px; font-size: 0.85rem;
  font-weight: 600; cursor: pointer; transition: all var(--transition);
  display: flex; align-items: center; gap: 8px;
}
.btn-prev { background: #ecf0f1; color: var(--text); }
.btn-prev:hover { background: #dfe4e6; }
.btn-next { background: var(--primary); color: white; }
.btn-next:hover { background: var(--primary-dark); }
.btn-next:disabled, .btn-prev:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-reset { background: transparent; color: var(--text-light); border: 1px solid #ddd !important; }
.btn-reset:hover { background: #f5f5f5; }

/* === PRESCRIPTION === */
.prescription-box {
  background: #fffef5; border: 2px solid #e8dcc8; border-radius: 12px;
  padding: 20px; font-family: 'Courier New', monospace; margin: 12px 0;
}
.prescription-box .rx-header { display: flex; justify-content: space-between; border-bottom: 1px dashed #ccc; padding-bottom: 8px; margin-bottom: 12px; font-size: 0.85rem; }
.prescription-box .rx-header .rx { font-size: 1.2rem; font-weight: 700; color: var(--primary); }
.prescription-box .rx-item { padding: 6px 0; border-bottom: 1px dotted #eee; display: flex; gap: 12px; font-size: 0.88rem; }
.prescription-box .rx-item .r { min-width: 30px; color: var(--primary); font-weight: 700; }
.prescription-box .rx-footer { margin-top: 12px; font-size: 0.8rem; color: var(--text-light); }

/* === DIFFERENTIAL === */
.dd-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 8px 0; }
.dd-item {
  background: #f8f9fa; padding: 10px 14px; border-radius: 10px;
  border-left: 4px solid #ddd; font-size: 0.85rem;
  transition: all 0.3s ease; cursor: pointer;
}
.dd-item:hover { border-left-color: var(--primary); background: #fef0ef; }
.dd-item .dd-title { font-weight: 600; }
.dd-item .dd-desc { font-size: 0.78rem; color: var(--text-light); margin-top: 2px; }
.dd-item.reveal { border-left-color: var(--primary); background: #fef0ef; }

/* === RESPONSIVE === */
@media (max-width: 768px) {
  .sidebar { width: 60px; min-width: 60px; }
  .sidebar h1 span, .sidebar .subtitle, .disease-list li .name { display: none; }
  .disease-list li { padding: 14px; justify-content: center; }
  .disease-list li .num { min-width: auto; font-size: 0.85rem; }
  .page { padding: 20px; }
  .topbar { padding: 8px 16px; }
  .topbar .title-section h2 { font-size: 0.9rem; }
  .dd-list { grid-template-columns: 1fr; }
}

/* === SCROLLBAR === */
.page::-webkit-scrollbar { width: 6px; }
.page::-webkit-scrollbar-track { background: transparent; }
.page::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

/* === ANATOMY SVG === */
.heart-svg { max-width: 220px; margin: 0 auto; display: block; }
.body-map { max-width: 160px; }

/* === LOADING === */
.loading { display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; gap: 16px; }
.loading .pulse { width: 40px; height: 40px; background: var(--primary); border-radius: 50%; animation: pulse 1.2s ease infinite; }
@keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.3); opacity: 0.6; } }
</style>
</head>

let currentDisease = 0;
let currentPage = 0;
let isFlipping = false;

function init() {
  renderDiseaseList();
  loadDisease(0);
  initECG();
}

function renderDiseaseList() {
  const list = document.getElementById('diseaseList');
  DISEASES.forEach((d, i) => {
    const li = document.createElement('li');
    li.innerHTML = `<span class="num">${i+1}</span><span class="name">${d.name}</span>`;
    li.onclick = () => goToDisease(i);
    li.id = `disease-${i}`;
    list.appendChild(li);
  });
}

function goToDisease(idx) {
  if (isFlipping) return;
  currentDisease = idx;
  currentPage = 0;
  loadDisease(idx);
  document.querySelectorAll('.disease-list li').forEach(li => li.classList.remove('active'));
  document.getElementById('disease-' + idx).classList.add('active');
}

function loadDisease(idx) {
  const disease = DISEASES[idx];
  const book = document.getElementById('flipbook');
  book.innerHTML = '';
  
  disease.pages.forEach((page, i) => {
    const div = document.createElement('div');
    div.className = 'page' + (i === 0 ? ' active' : '');
    div.id = 'page-' + idx + '-' + i;
    
    div.innerHTML = '<div class="page-header"><span class="step">' + page.step + '</span><span class="page-title">' + page.title + '</span><span class="page-num">' + (i+1) + '/' + disease.pages.length + '</span></div>' + page.content;
    book.appendChild(div);
  });
  
  updateUI();
  drawECGs();
}

function updateUI() {
  const disease = DISEASES[currentDisease];
  document.getElementById('flipTitle').textContent = disease.name;
  document.getElementById('flipBadge').textContent = (currentDisease+1) + '/' + DISEASES.length;
  document.getElementById('pageNum').textContent = currentPage + 1;
  document.getElementById('pageTotal').textContent = disease.pages.length;
  
  document.getElementById('prevBtn').disabled = currentPage === 0;
  document.getElementById('nextBtn').disabled = currentPage === disease.pages.length - 1;
  
  document.querySelectorAll('.page').forEach((el, i) => {
    el.classList.toggle('active', i === currentPage);
  });
}

function nextPage() {
  if (isFlipping) return;
  const disease = DISEASES[currentDisease];
  if (currentPage >= disease.pages.length - 1) return;
  
  isFlipping = true;
  const oldPage = document.getElementById('page-' + currentDisease + '-' + currentPage);
  oldPage.classList.add('flipping');
  
  setTimeout(() => {
    oldPage.classList.remove('active', 'flipping');
    currentPage++;
    const newPage = document.getElementById('page-' + currentDisease + '-' + currentPage);
    newPage.classList.add('flipping-in');
    updateUI();
    setTimeout(() => {
      newPage.classList.remove('flipping-in');
      isFlipping = false;
    }, 500);
  }, 350);
}

function prevPage() {
  if (isFlipping) return;
  if (currentPage <= 0) return;
  
  isFlipping = true;
  const oldPage = document.getElementById('page-' + currentDisease + '-' + currentPage);
  oldPage.classList.add('flipping');
  oldPage.style.animation = 'flipOut 0.6s ease reverse';
  
  setTimeout(() => {
    oldPage.classList.remove('active', 'flipping');
    oldPage.style.animation = '';
    currentPage--;
    const newPage = document.getElementById('page-' + currentDisease + '-' + currentPage);
    newPage.classList.add('active');
    updateUI();
    setTimeout(() => { isFlipping = false; }, 300);
  }, 350);
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextPage();
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevPage();
});

function initECG() {}

function drawECGs() {
  const c1 = document.getElementById('ecgCanvas1');
  if (c1) drawECG(c1, 'lvh');
  const c2 = document.getElementById('ecgCanvas2');
  if (c2) drawECG(c2, 'stemi');
  const c3 = document.getElementById('ecgCanvas3');
  if (c3) drawECG(c3, 'chf');
  const c5 = document.getElementById('ecgCanvas5');
  if (c5) drawECG(c5, 'afib');
  const c6 = document.getElementById('ecgCanvas6');
  if (c6) drawECG(c6, 'pmitrale');
  const c8 = document.getElementById('ecgCanvas8');
  if (c8) drawECG(c8, 'pericarditis');
}

function drawECG(canvas, type) {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = Math.min(800, rect.width - 20) * 2;
  canvas.height = 120 * 2;
  canvas.style.width = (canvas.width / 2) + 'px';
  canvas.style.height = '120px';
  
  const ctx = canvas.getContext('2d');
  const w = canvas.width;
  const h = canvas.height;
  ctx.scale(2, 2);
  
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, w/2, h/2);
  
  ctx.strokeStyle = '#e0e0e0';
  ctx.lineWidth = 0.3;
  for (let x = 0; x < w/2; x += 5) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h/2); ctx.stroke(); }
  for (let y = 0; y < h/2; y += 5) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w/2, y); ctx.stroke(); }
  
  ctx.strokeStyle = '#d0d0d0';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < w/2; x += 25) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h/2); ctx.stroke(); }
  for (let y = 0; y < h/2; y += 25) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w/2, y); ctx.stroke(); }
  
  ctx.strokeStyle = '#c0392b';
  ctx.lineWidth = 2;
  ctx.beginPath();
  
  const midY = h/4;
  let amplitude = 20;
  if (type === 'stemi') amplitude = 28;
  else if (type === 'afib') amplitude = 18;
  else if (type === 'pericarditis') amplitude = 22;
  
  const isAFib = type === 'afib';
  const points = [];
  for (let x = 0; x < w/2 - 40; x += 1) {
    let y = midY;
    const t = x / 20;
    
    if (isAFib) {
      y += (Math.random() - 0.5) * 2.5;
      if (x % 60 > 46 && x % 60 < 52) y -= Math.sin(((x % 60) - 46) / 6 * Math.PI) * (14 + (x % 7) * 2);
      else if (x % 60 > 52 && x % 60 < 58) y += Math.sin(((x % 60) - 52) / 6 * Math.PI) * 4;
    } else if (type === 'pericarditis') {
      if (x < 10) y += Math.sin(t * 0.1) * 1;
      else if (x >= 10 && x < 30) { const p = (x - 10) / 20; y -= Math.sin(p * Math.PI) * 5; }
      else if (x >= 30 && x < 55) y += Math.sin(t * 0.1) * 0.5;
      else if (x >= 55 && x < 75) { const q = (x - 55) / 20; y += Math.sin(q * Math.PI) * 3; y -= Math.sin(q * Math.PI) * amplitude; }
      else if (x >= 75 && x < 95) y += Math.sin((x - 75) / 20 * Math.PI) * 5;
      else if (x >= 95 && x < 115) y -= 3;
      else if (x >= 115 && x < 155) { const tw = (x - 115) / 40; y -= Math.sin(tw * Math.PI) * 8; }
      else y += Math.sin(t * 0.1) * 0.5;
    } else if (type === 'pmitrale') {
      if (x < 10) y += Math.sin(t * 0.1);
      else if (x >= 10 && x < 20) { const p1 = (x - 10) / 10; y -= Math.sin(p1 * Math.PI) * 4; }
      else if (x >= 20 && x < 25) y += Math.sin(t * 0.2) * 1;
      else if (x >= 25 && x < 35) { const p2 = (x - 25) / 10; y -= Math.sin(p2 * Math.PI) * 4; }
      else if (x >= 35 && x < 60) y += Math.sin(t * 0.1) * 0.5;
      else if (x >= 60 && x < 80) { const q = (x - 60) / 20; y += Math.sin(q * Math.PI) * 3; y -= Math.sin(q * Math.PI) * amplitude; }
      else if (x >= 80 && x < 95) y += Math.sin((x - 80) / 15 * Math.PI) * 5;
      else if (x >= 95 && x < 120) y += 0.5;
      else if (x >= 120 && x < 160) { const tw = (x - 120) / 40; y += Math.sin(tw * Math.PI) * 7; }
      else y += Math.sin(t * 0.1) * 0.5;
    } else {
      if (x < 10) y += Math.sin(t * 0.1) * 1;
      else if (x >= 10 && x < 30) { const p = (x - 10) / 20; y -= Math.sin(p * Math.PI) * (type === 'lvh' ? 8 : 6); }
      else if (x >= 30 && x < 60) y += Math.sin(t * 0.1) * 1;
      else if (x >= 60 && x < 105) {
        const q = (x - 60) / 45;
        if (q < 0.2) y += Math.sin(q / 0.2 * Math.PI) * 4;
        else if (q < 0.35) y -= Math.sin((q - 0.2) / 0.15 * Math.PI) * amplitude;
        else if (q < 0.5) y += Math.sin((q - 0.35) / 0.15 * Math.PI) * 6;
        else y += Math.sin(t * 0.1) * 1;
      } else if (x >= 105 && x < 140) {
        if (type === 'stemi') y -= 4;
        else if (type === 'lvh') y += Math.sin(t * 0.2) * 1;
        else y += Math.sin(t * 0.2) * 0.5;
      } else if (x >= 140 && x < 190) {
        const tw = (x - 140) / 50;
        if (type === 'stemi') y -= Math.sin(tw * Math.PI) * 10;
        else if (type === 'chf') y += Math.sin(tw * Math.PI) * 7;
        else y += Math.sin(tw * Math.PI) * (type === 'lvh' ? 6 : 8);
      } else if (x >= 190 && x < 210) y += Math.sin(t * 0.1) * 1;
    }
    points.push({ x: x + 20, y: y });
  }
  
  points.forEach((p, i) => {
    if (i === 0) ctx.moveTo(p.x, p.y);
    else ctx.lineTo(p.x, p.y);
  });
  ctx.stroke();
  
  ctx.fillStyle = '#2c3e50';
  ctx.font = 'bold 11px sans-serif';
  ctx.fillText(type === 'lvh' ? 'EKG: LVH (Sokolow-Lyon >35mm)' : (type === 'stemi' ? 'EKG: STEMI Anterior (ST Elevasi V1-V4)' : (type === 'chf' ? 'EKG: CHF — LVH + Q patologis' : (type === 'afib' ? 'EKG: Fibrilasi Atrium' : (type === 'pmitrale' ? 'EKG: P Mitrale (st. mitral)' : 'EKG: Perikarditis')))), 20, 18);
  
  ctx.font = '10px sans-serif';
  ctx.fillStyle = type === 'stemi' || type === 'pericarditis' || type === 'chf' ? '#c0392b' : '#8e44ad';
  ctx.fillText(type === 'stemi' ? '↑ ST elevasi' : (type === 'lvh' ? 'LVH + Strain pattern' : (type === 'afib' ? 'Irama irreguler | P hilang' : (type === 'pericarditis' ? 'ST elevasi difus + PR depresi' : (type === 'pmitrale' ? 'P bifid (mitral P wave)' : 'LVH + Q patologis anterior')))), 20, 58);
}

function updateUI() {
  const disease = DISEASES[currentDisease];
  document.getElementById('flipTitle').textContent = disease.name;
  document.getElementById('flipBadge').textContent = `${currentDisease+1}/${DISEASES.length}`;
  document.getElementById('pageNum').textContent = currentPage + 1;
  document.getElementById('pageTotal').textContent = disease.pages.length;
  
  document.getElementById('prevBtn').disabled = currentPage === 0;
  document.getElementById('nextBtn').disabled = currentPage === disease.pages.length - 1;
  
  // Show active page
  document.querySelectorAll('.page').forEach((el, i) => {
    el.classList.toggle('active', i === currentPage);
  });
}

function nextPage() {
  if (isFlipping) return;
  const disease = DISEASES[currentDisease];
  if (currentPage >= disease.pages.length - 1) return;
  
  isFlipping = true;
  const oldPage = document.getElementById(`page-${currentDisease}-${currentPage}`);
  oldPage.classList.add('flipping');
  
  setTimeout(() => {
    oldPage.classList.remove('active', 'flipping');
    currentPage++;
    const newPage = document.getElementById(`page-${currentDisease}-${currentPage}`);
    newPage.classList.add('flipping-in');
    updateUI();
    setTimeout(() => {
      newPage.classList.remove('flipping-in');
      isFlipping = false;
    }, 500);
  }, 350);
}

function prevPage() {
  if (isFlipping) return;
  if (currentPage <= 0) return;
  
  isFlipping = true;
  const oldPage = document.getElementById(`page-${currentDisease}-${currentPage}`);
  oldPage.classList.add('flipping');
  oldPage.style.animation = 'flipOut 0.6s ease reverse';
  
  setTimeout(() => {
    oldPage.classList.remove('active', 'flipping');
    oldPage.style.animation = '';
    currentPage--;
    const newPage = document.getElementById(`page-${currentDisease}-${currentPage}`);
    newPage.classList.add('active');
    updateUI();
    setTimeout(() => { isFlipping = false; }, 300);
  }, 350);
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextPage();
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') prevPage();
});

// ============================================================
// ECG SIMULATOR (Canvas-based)
// ============================================================
function initECG() {
  // Will be called when needed
}

function drawECGs() {
  const c1 = document.getElementById('ecgCanvas1');
  if (c1) drawECG(c1, 'lvh');          // Hipertensi — LVH
  const c2 = document.getElementById('ecgCanvas2');
  if (c2) drawECG(c2, 'stemi');         // IMA — STEMI
  const c3 = document.getElementById('ecgCanvas3');
  if (c3) drawECG(c3, 'chf');           // Gagal Jantung — LVH + Q patologis
  const c5 = document.getElementById('ecgCanvas5');
  if (c5) drawECG(c5, 'afib');          // FA — Fibrilasi Atrium
  const c6 = document.getElementById('ecgCanvas6');
  if (c6) drawECG(c6, 'pmitrale');      // PJR — P mitrale
  const c8 = document.getElementById('ecgCanvas8');
  if (c8) drawECG(c8, 'pericarditis');  // Perikarditis — ST elevasi difus
}

function drawECG(canvas, type) {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = Math.min(800, rect.width - 20) * 2;
  canvas.height = 120 * 2;
  canvas.style.width = (canvas.width / 2) + 'px';
  canvas.style.height = '120px';
  
  const ctx = canvas.getContext('2d');
  const w = canvas.width;
  const h = canvas.height;
  ctx.scale(2, 2);
  
  // Background (grid)
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, w/2, h/2);
  
  // Small grid
  ctx.strokeStyle = '#e0e0e0';
  ctx.lineWidth = 0.3;
  for (let x = 0; x < w/2; x += 5) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h/2); ctx.stroke();
  }
  for (let y = 0; y < h/2; y += 5) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w/2, y); ctx.stroke();
  }
  
  // Big grid (25 small squares = 1 big)
  ctx.strokeStyle = '#d0d0d0';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < w/2; x += 25) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h/2); ctx.stroke();
  }
  for (let y = 0; y < h/2; y += 25) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w/2, y); ctx.stroke();
  }
  
  // ECG signal
  ctx.strokeStyle = '#c0392b';
  ctx.lineWidth = 2;
  ctx.beginPath();
  
  const midY = h/4;
  let amplitude = 20;
  if (type === 'stemi') amplitude = 28;
  else if (type === 'afib') amplitude = 18;
  else if (type === 'pericarditis') amplitude = 22;
  
  // Generate ECG-like waveform based on type
  const isAFib = type === 'afib';
  const points = [];
  for (let x = 0; x < w/2 - 40; x += 1) {
    let y = midY;
    const t = x / 20;
    
    if (isAFib) {
      // FIBRILASI ATRIUM: P hilang, baseline fibrilasi (f waves), QRS irreguler
      y += (Math.random() - 0.5) * 2.5; // fibrilasi f
      if (x % 60 > 46 && x % 60 < 52) {
        y -= Math.sin(((x % 60) - 46) / 6 * Math.PI) * (14 + (x % 7) * 2);
      } else if (x % 60 > 52 && x % 60 < 58) {
        y += Math.sin(((x % 60) - 52) / 6 * Math.PI) * 4;
      }
    } else if (type === 'pericarditis') {
      // PERIKARDITIS: ST elevasi difus, PR depresi
      if (x < 10) { y += Math.sin(t * 0.1) * 1; }
      else if (x >= 10 && x < 30) { const p = (x - 10) / 20; y -= Math.sin(p * Math.PI) * 5; }
      else if (x >= 30 && x < 55) { y += Math.sin(t * 0.1) * 0.5; }
      else if (x >= 55 && x < 75) { const q = (x - 55) / 20; y += Math.sin(q * Math.PI) * 3; y -= Math.sin(q * Math.PI) * amplitude; }
      else if (x >= 75 && x < 95) { y += Math.sin((x - 75) / 20 * Math.PI) * 5; }
      else if (x >= 95 && x < 115) { y -= 3; } // ST elevasi!
      else if (x >= 115 && x < 155) { const tw = (x - 115) / 40; y -= Math.sin(tw * Math.PI) * 8; }
      else { y += Math.sin(t * 0.1) * 0.5; }
    } else if (type === 'pmitrale') {
      // P MITRALE (P bifid) pada PJR
      if (x < 10) { y += Math.sin(t * 0.1); }
      else if (x >= 10 && x < 20) { const p1 = (x - 10) / 10; y -= Math.sin(p1 * Math.PI) * 4; }
      else if (x >= 20 && x < 25) { y += Math.sin(t * 0.2) * 1; }
      else if (x >= 25 && x < 35) { const p2 = (x - 25) / 10; y -= Math.sin(p2 * Math.PI) * 4; } // P bifid!
      else if (x >= 35 && x < 60) { y += Math.sin(t * 0.1) * 0.5; }
      else if (x >= 60 && x < 80) { const q = (x - 60) / 20; y += Math.sin(q * Math.PI) * 3; y -= Math.sin(q * Math.PI) * amplitude; }
      else if (x >= 80 && x < 95) { y += Math.sin((x - 80) / 15 * Math.PI) * 5; }
      else if (x >= 95 && x < 120) { y += 0.5; }
      else if (x >= 120 && x < 160) { const tw = (x - 120) / 40; y += Math.sin(tw * Math.PI) * 7; }
      else { y += Math.sin(t * 0.1) * 0.5; }
    } else {
      // STANDARD: hipertensi/LVH, CHF, STEMI
      if (x < 10) { y += Math.sin(t * 0.1) * 1; }
      else if (x >= 10 && x < 30) { const p = (x - 10) / 20; y -= Math.sin(p * Math.PI) * (type === 'lvh' ? 8 : 6); }
      else if (x >= 30 && x < 60) { y += Math.sin(t * 0.1) * 1; }
      else if (x >= 60 && x < 105) {
        const q = (x - 60) / 45;
        if (q < 0.2) { y += Math.sin(q / 0.2 * Math.PI) * 4; }
        else if (q < 0.35) { y -= Math.sin((q - 0.2) / 0.15 * Math.PI) * amplitude; }
        else if (q < 0.5) { y += Math.sin((q - 0.35) / 0.15 * Math.PI) * 6; }
        else { y += Math.sin(t * 0.1) * 1; }
      } else if (x >= 105 && x < 140) {
        if (type === 'stemi') { y -= 4; }
        else if (type === 'lvh') { y += Math.sin(t * 0.2) * 1; }
        else { y += Math.sin(t * 0.2) * 0.5; }
      } else if (x >= 140 && x < 190) {
        const tw = (x - 140) / 50;
        if (type === 'stemi') { y -= Math.sin(tw * Math.PI) * 10; }
        else if (type === 'chf') { y += Math.sin(tw * Math.PI) * 7; }
        else { y += Math.sin(tw * Math.PI) * (type === 'lvh' ? 6 : 8); }
      } else if (x >= 190 && x < 210) { y += Math.sin(t * 0.1) * 1; }
    }
    
    points.push({ x: x + 20, y: y });
  }
  
  // Draw the waveform
  points.forEach((p, i) => {
    if (i === 0) ctx.moveTo(p.x, p.y);
    else ctx.lineTo(p.x, p.y);
  });
  ctx.stroke();
  
  // Labels
  ctx.fillStyle = '#2c3e50';
  ctx.font = 'bold 11px sans-serif';
  const labels = {
    'lvh': 'EKG: LVH (Sokolow-Lyon >35mm) - Strain pattern',
    'stemi': 'EKG: STEMI Anterior (ST Elevasi V1-V4)',
    'chf': 'EKG: CHF — LVH + Q patologis (infark lama)',
    'afib': 'EKG: Fibrilasi Atrium — Irama irreguler, P hilang',
    'pmitrale': 'EKG: P Mitrale (P bifid) pada Stenosis Mitral',
    'pericarditis': 'EKG: Perikarditis — ST Elevasi Difus + PR Depresi'
  };
  ctx.fillText(labels[type] || 'EKG: Irama Sinus Normal', 20, 18);
  
  ctx.font = '10px sans-serif';
  if (type === 'stemi') {
    ctx.fillStyle = '#c0392b';
    ctx.fillText('↑ ST elevasi', 20, 58);
  } else if (type === 'lvh') {
    ctx.fillStyle = '#8e44ad';
    ctx.fillText('LVH + Strain pattern', 20, 58);
  } else if (type === 'afib') {
    ctx.fillStyle = '#8e44ad';
    ctx.fillText('Irama irreguler | P tidak tampak | f waves', 20, 58);
  } else if (type === 'pericarditis') {
    ctx.fillStyle = '#c0392b';
    ctx.fillText('ST elevasi difus concave upward + PR depresi', 20, 58);
  } else if (type === 'pmitrale') {
    ctx.fillStyle = '#8e44ad';
    ctx.fillText('P mitrale (bifid) ↓ | LVH | Gelombang Q (infark lama)', 20, 58);
  } else if (type === 'chf') {
    ctx.fillStyle = '#c0392b';
    ctx.fillText('LVH + Q patologis anterior + ST-T changes', 20, 58);
  }
}

if (document.readyState === "loading") { document.addEventListener("DOMContentLoaded", init); } else { init(); }
